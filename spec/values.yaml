# Build-time tuning constants generated by `pnpm gen:values`.
# Groups and keys use snake_case; generated consumers expose camelCase TS keys
# and PascalCase Go constants.
#
# Put product-shaping constants here: thresholds, caps, coefficients, defaults,
# debounce/delay windows, numeric arrays, and explicit scalar lookup tables.
#
# Keep these out of values.yaml: runtime env, secrets, URLs, DSNs, API keys,
# feature flags, proto contracts, SQL schemas, formulas, UI copy, theme CSS, and
# arrays whose length can be derived from their content.
client_cache:
  # TanStack Query defaults shared by web and mobile cache providers.
  default_stale_ms: 30000
  default_gc_ms: 300000
  default_retry_count: 1
  optimistic_rollback_ms: 10000

auth_session:
  # Refresh before expiry so transport calls do not fall through to anonymous RPCs.
  access_token_refresh_skew_ms: 60000

supabase_auth:
  # Cache Supabase JWKS long enough to avoid per-request key fetches.
  jwks_cache_ttl_ms: 600000
  # Rate-limit forced JWKS refreshes after key misses.
  jwks_miss_refresh_interval_ms: 60000

rendering:
  # Active universe background skin (preset key in @cosimosi/shaders UNIVERSE_SKINS:
  # aurora | ember | void). Build-time selection; re-skin by changing this.
  active_skin: aurora
  # Cap devicePixelRatio so high-DPI screens don't tank the GPU frame budget.
  max_pixel_ratio: 2
  # Overall exposure of the emotion palette before a sky effect shapes it. Kept below 1 because
  # the enclosing sky covers the whole frame and the scene bloom pass amplifies bright regions.
  emotion_sky_exposure: 0.62
  # Per-effect alpha of the enclosing emotion sky. Full-frame fills stay more transparent while
  # sparse line/ray effects retain enough presence; every effect leaves the black void and stars
  # visible even when one emotion fills the palette ramp.
  emotion_sky_opacity:
    grainient: 0.74
    iridescence: 0.76
    soft_aurora: 0.86
    liquid_ether: 0.74
    prismatic_burst: 0.9
    plasma_wave: 0.92
    ferrofluid: 0.92
    floating_lines: 0.88
    ripple_grid: 0.9
    evil_eye: 0.92
    lightfall: 0.92
    pixel_blast: 0.94
  # InstancedMesh bucket capacity — nodes batch into fixed-size instanced draws.
  instance_bucket_size: 4096
  # Star (episodic-memory) instance scale range — world radius mapped from EffectiveStrength
  # (base_strength + recall accumulation). Bigger memory → bigger star [V3].
  star_size_min: 0.9
  star_size_max: 3.2
  # Star brightness range mapped from EffectiveBrightness [V2]. Epic A resolves full (max);
  # min is the decay floor Epic D dims toward — a star is dimmed, never deleted.
  star_brightness_min: 0.15
  star_brightness_max: 1.0
  # Filament (synapse) fat-line half-width range in world units, mapped from
  # EffectiveSynapseStrength — a stronger synapse draws a thicker line [V6].
  filament_width_min: 0.04
  filament_width_max: 0.35
  # Filament glow range mapped from EffectiveSynapseStrength — stronger synapse glows brighter [V6].
  filament_brightness_min: 0.12
  filament_brightness_max: 0.85
  # Cell-star (neuron) constant point radius in world units — seedless, no emotion color; a
  # neuron carries information, not emotion [V5]. Degree-driven sizing stays reserved.
  cell_star_point_size: 0.35
  # Latent-star field ([E7a][V7]): gray not-yet-recruited engram points scattered through the
  # hippocampus z-band (force_sim.hippocampus_z_*), filling the visible volume. Rendering-only,
  # no DB. Web = open-beta density; mobile MVP lowers the instance count (§3.5).
  latent_star_count: 800
  latent_star_count_mobile: 300
  # World radius of the x,y disc the field scatters within (z comes from the hippocampus band).
  latent_field_radius: 34
  # Latent point world radius — small and dim; below cell_star_point_size so a real neuron reads
  # as brighter/larger than the silent field it wakes from.
  latent_star_size: 0.14
  # Awaken flare pool ceiling: max concurrent birth flares rendered at once. A launch rarely births
  # more than a few new neurons; an overflowing burst is not lost — the excess flares on the next
  # pass (the animation look/motion stays in code; only this pool cap is tuning).
  awaken_capacity: 32
  # Gist-star (neocortical body, [V3][V5][V9]) instance scale range mapped from EffectiveStrength —
  # kept below the episodic star_size_* so a gist reads as a quieter echo of its memory.
  gist_star_size_min: 0.7
  gist_star_size_max: 2.4
  # Base softness of the diffuse gist body (0..1) — the [V5] "gistified" look distinguishing it
  # from the sharp episodic seed body; deeper stages read progressively more diffuse from here.
  gist_star_diffuse: 0.55
  # Depth-cue haze intensity across the hippocampus↔neocortex gap (z 10–15, [V9]) — a restrained
  # rendering affordance marking the layer boundary, never a wall.
  gist_rise_layer_fog: 0.35

nebula:
  # Emotion color field ([M4][M5]): each rendered memory bleeds its mood color into the ambient
  # field, weighted by EffectiveStrength (base + recall accumulation). Its own group — the unit
  # owns a coherent scalar set; folding into rendering.* would blur ownership. Contributions
  # composite additively behind the bodies, so the universe's global tone is emergent, never
  # stored. Realized as per-contributor soft-glow kernels in world space (see tech/rendering.md).
  #
  # EffectiveStrength → bleed radius (world units). Stronger stars bleed wider [M4]. Kept modest so
  # kernels stay local: in a dense cluster many wide kernels sum additively and wash the core to
  # white, so radius is tuned to bleed between neighbors without flooding the center.
  bleed_radius_coefficient: 12
  # Floor radius so even the weakest star reads as a tight local glow rather than vanishing [M4].
  min_bleed_radius: 3
  # Local-region density falloff sharpness — higher concentrates color near the star, so overlapping
  # regions still bleed but each keeps a dense core and the diffuse mid-field haze (which is what
  # sums toward white where stars cluster) stays thin.
  falloff_exponent: 3.5
  # Contributor budget cap — the strongest N memories bleed into the field (perf lever, shared
  # by web and mobile; the field stays legible when a universe grows past this).
  max_contributors: 96
  # Per-platform contributor kernel tessellation (silhouette smoothness of each glow). Mobile
  # lower — the MVP fidelity reduction from the same TSL source (§3.5).
  field_resolution_web: 24
  field_resolution_mobile: 10
  # Overall additive amplitude per kernel — the primary saturation lever. Held well below 1 so that
  # where many kernels overlap their sum reads as a coexisting blend rather than a blown-out white
  # core, especially since the bloom PostFX pass amplifies the field further.
  base_intensity: 0.3

ai:
  # Voyage 4-family embeddings default to 1024 dimensions while still allowing smaller/larger Matryoshka outputs.
  embedding_dim: 1024
  # Generic max-output guard for one real LLM call; provider/model specifics stay runtime config.
  per_call_token_cap: 1200
  # Real AI adapters meter billable calls per user on a UTC calendar-day window.
  daily_call_cap: 200
  # Worker failures retry this many total attempts before the row is kept as failed.
  job_max_attempts: 5
  # Exponential worker retry base: base * 2^attempts, with no jitter for deterministic tests.
  job_backoff_base_ms: 60000
  # A claimed job's lease window: it only has to outlast one handler run. A worker that
  # dies mid-run frees its job for re-claim after this; the lease fence keeps the dead
  # worker from finalizing the row late. Its own knob, not coupled to the retry backoff.
  job_lease_ms: 300000
  # Hard loop-breaker: a job re-claimed this many times without ever completing (a handler
  # that keeps killing its worker) is dead-lettered. Set well above job_max_attempts so
  # ordinary transient retries never trip it.
  job_max_claims: 20
  # Queue-inspection metadata for done/failed/cancelled jobs is retained for this many
  # real-clock days, then removed in bounded batches by the worker loop. This governs
  # identity/revision-only job metadata, never Diary or memory source retention.
  job_terminal_retention_days: 30

emotion:
  # Mood coordinates are domain facts, stored on each memory at launch time.
  mood_valence:
    joy: 0.82
    calm: 0.62
    sad: -0.78
    anger: -0.76
    fear: -0.82
    love: 0.9
    neutral: 0
    excitement: 0.78
    gratitude: 0.76
    relief: 0.68
    stress: -0.7
    tired: -0.55
    emptiness: -0.68
  mood_arousal:
    joy: 0.72
    calm: 0.22
    sad: 0.28
    anger: 0.86
    fear: 0.88
    love: 0.66
    neutral: 0.5
    excitement: 0.9
    gratitude: 0.38
    relief: 0.3
    stress: 0.78
    tired: 0.18
    emptiness: 0.16
  # Arousal linearly seeds a memory's initial strength; later recall/decay rules build on it.
  arousal_strength_min: 0.35
  arousal_strength_max: 0.75
  default_intensity: 0.7

palette:
  # Axis-consistency tolerance [P3]: checkPaletteAxisConsistency reads each mood color's
  # warm/cool value from its hue (a code formula), multiplies it against the mood's stored
  # valence (emotion.mood_valence), and warns when the contradiction — a cool color on a
  # positive-valence mood, or a warm color on a negative one — exceeds this. Warn-only, never
  # a hard block. Tuned so every shipped registry palette passes with margin (the default's
  # sharpest contradiction sits at ~0.4) while a genuinely inverted palette still trips.
  axis_warn_valence_threshold: 0.6

encode:
  # Event-boundary split bounds per diary; outside this range the extractor is re-prompted, never clamped.
  min_memories: 2
  max_memories: 5
  # Extraction guideline enforced as retry/repair — a placeholder neuron is never injected.
  min_semantic_neurons: 1
  # Repair/revise re-prompts allowed per SplitDiary/ReviseSplit call after the initial extraction:
  # one user instruction plus up to two schema/count repairs before the canonical error.
  max_revise_retries: 3
  # Output budget the use-case enforces on the returned split (estimated tokens);
  # kept below ai.per_call_token_cap so the encode guard trips before the generic guard.
  max_output_tokens: 1000
  # Embedding-assist dedup: minimum cosine similarity for a neuron to surface as a
  # canonicalization candidate. Conservative — only near-identical wordings qualify,
  # keeping the merge bias toward "true synonyms only".
  dedup_similarity_threshold: 0.85
  # Embedding-assist dedup: nearest-neighbour candidates fetched per split. Small on
  # purpose — the assist is narrow; the LLM sees few, high-confidence candidates.
  dedup_top_k: 8
  # Name-in-body dedup candidates fetched per split, longest (most specific) names
  # first. Bounds the extractor prompt against users with many short neuron names.
  dedup_body_match_limit: 32
  # Co-membership weight written per neuron activation at launch. Uniform in Epic A;
  # differentiated weighting is a later-epic refinement behind the same NOT NULL column.
  activation_weight: 1.0

synapse:
  # Saturating LTP gains this fraction of the remaining headroom per co-firing.
  potentiation_rate: 0.2
  # One cap for every synapse signal kind; signal differences live in initials.
  strength_cap: 1.0
  # Fresh links start low and tier by causal signal strength (same > shared > temporal, [L10]).
  initial_same_memory: 0.32
  # Reserved tiers: today's linking seeds no synapse from these — a shared neuron is the link via
  # membership (no edge) and temporal proximity is a bonus, not an initial. Kept for a later
  # cross-memory linker that mints distinct shared/temporal edges.
  initial_shared_neuron: 0.2
  initial_temporal: 0.08
  # Read-time effective strength fades slowly in universe-days without mutating the stored base.
  strength_decay_per_day: 0.015
  # Temporal-link knobs: a co-firing inside temporal_window_days earns temporal_bonus on top of the
  # base — consumed by Link at launch.
  temporal_window_days: 3
  temporal_bonus: 0.1

semantic:
  # [C6a] Universe-days per gist stage: the gist-timer rises one semantic_stage each time this many
  # (modulation-adjusted) universe-days pass since semanticize_timer_reset_at. The timer REUSES the
  # forgetting.*_slow_coefficient modulation (arousal + connection slow it) — one knob for both axes,
  # no second modulation key. SEMANTIC_MAX_STAGE is the derived count of pregenerated gist texts (code,
  # not a value), and the neocortex z-band is force_sim.neocortex_z_* (reused, not re-declared).
  gist_units_per_stage: 10

reconsolidation:
  # [R3][V3] Per-recall headroom fraction the EffectiveStrength recall term gains, saturating toward
  # synapse.strength_cap — a handful of recalls grows a star noticeably without ever reaching the cap.
  recall_strength_gain: 0.15
  # [R5] Signed neighbor forgetting nudge in universe-days, added to a neighbor's forgetting_offset_days
  # on recall (never to the recalled star itself, [F5]). neighbor_slow_days is NEGATIVE — one shared
  # semantic neuron co-recalls a weak link (spreading activation), slowing its forgetting.
  neighbor_slow_days: -2.0
  # [R5] POSITIVE delta for a neighbor sharing >= neighbor_speed_threshold semantic neurons: a strong
  # competitor is inhibited (retrieval-induced forgetting, Anderson 1994), speeding its forgetting.
  neighbor_speed_days: 3.0
  # [R5] Shared-semantic-neuron count at/above which the neighbor delta flips from slow (-) to speed (+).
  # Fixed by the PRD (1 vs >=2) but kept a value so the boundary is not hardcoded.
  neighbor_speed_threshold: 2

consolidation:
  # [C4] Per-sleep global homeostatic scale-down (SHY) applied to every synapse's stored base
  # strength on a clock advance. Gentle on purpose: the universe sleeps on every launch/recall,
  # so the renormalization compounds across sleeps. Its own group — folding into synapse.* would
  # blur the SHY-vs-LTD ownership [I9].
  downscale_factor: 0.05
  # [C4][I1] The positive residual floor Downscale never drops a synapse below — a weak edge dims
  # toward silence but is never removed. Downscale also never weakens an edge already at/below it.
  downscale_floor: 0.05
  # [C4] Weak-edge bias exponent: how sharply the renormalization spares strong edges (keep signal,
  # prune noise). Higher = strong edges lose even less of the per-sleep factor.
  downscale_weak_bias: 2.0
  # [C2] Replay-set expansion bound: how many shared-neuron hops the touched constellation grows
  # from a stage-advanced memory. Bounds the companion re-layout so a long interval never
  # reorganizes the whole universe.
  replay_neighbor_hops: 1

forgetting:
  # Read-time brightness fade coefficient (per universe-day) driving EffectiveBrightness down its
  # exponential toward the floor — the Ebbinghaus curve made visible [F1][V2].
  brightness_decay_per_day: 0.02
  # The silent-engram floor EffectiveBrightness never drops below (never 0): a star dims, it is
  # never deleted [F2][I1]. Aligned with rendering.star_brightness_min — that render floor is the
  # visual image of this domain value.
  brightness_floor: 0.15
  # Universe-days per decay stage (the step spacing DecayStage crosses, stretched by the slow
  # factor) [F1].
  stage_interval_days: 30
  # Per-stage fraction of removable words redacted, strictly increasing; the ARRAY LENGTH derives
  # the number of decay stages (maxStage) — there is no separate declared count [F1][F9]. Applies to
  # stages 1..N; stage 0 is the vivid, unredacted text. The exact ratios are a v1 "to refine" [F9].
  stage_word_removal_ratios: [0.2, 0.4, 0.6, 0.85]
  # How strongly arousal stretches the decay time-axis — high-arousal memories dim/decay slower
  # (McGaugh consolidation); arousal is the only emotion input, valence never enters [F6][I3].
  arousal_slow_coefficient: 1.0
  # How strongly EffectiveStrength (connection/size) stretches the decay time-axis — better-connected
  # memories forget slower [F7].
  connection_slow_coefficient: 1.0
  # [F4][G1] Accessibility cost WEIGHT (a multiplier, not a Twinkle price — Epic F prices it, CC3):
  # deeper forgetting makes an episodic recall harder to pull back. Floor = the fully-accessible
  # baseline a freshly-recalled recall costs (never free [G1]); cap = a maximally decayed silent-engram
  # recall, expensive but bounded (never unreachable [I1][F2]).
  cost_weight_floor: 1.0
  cost_weight_cap: 4.0
  # Convex curvature of the floor->cap ease; > 1 keeps early decay cheap and steepens toward the floor
  # of silence [F4]. The curve formula + the [floor, cap] clamp stay code.
  cost_weight_curve: 2.0

twinkle:
  # [G2] The daily basic Twinkle grant: refills to this amount at the start of each real UTC
  # calendar day and never carries unspent remainder into the next day. Sized so a day of
  # ordinary recall (a handful of 회고 + gist views) fits inside it — basic must not block the
  # core loop [G5].
  basic_daily_amount: 100
  # [G4][F4] 회고 (recall) price floor term: the base Twinkle a recall costs before the
  # decay-depth term is added. The accessibility weight (forgetting.cost_weight_*) starts at
  # 1.0, so the cheapest real recall is base + coefficient.
  recall_base_cost: 5
  # [G4][F4] How steeply recall price rises per unit of accessibility/decay-depth weight —
  # deeper-forgotten memories cost more to pull back.
  recall_depth_coefficient: 10
  # [G4][G5] Cap on a single 회고 price so a maximally-decayed silent engram stays recallable
  # within a plausible daily balance (bounded, never unreachable).
  recall_max_cost: 40
  # [G4][R8] 요지 별 열람 (gist view) price at the shallowest gist stage (stage 1).
  gist_base_cost: 10
  # [G4][R8] Twinkle discount per deeper gist stage — deeper abstraction is cheaper to skim.
  gist_stage_discount: 3
  # [G4][G1] Floor for gist-view price: cheap but never free (the free surface is meta info
  # and the forgotten current text, not a gist read).
  gist_min_cost: 3
  # [G3] Twinkle granted per launched diary (the write earn path) — once per diary, not per
  # star, credited to additional; a past-dated diary that launches no star earns nothing.
  earn_write: 100
  # [G3] Twinkle granted to the inviter on a valid signup (the invite earn path). Split from
  # the invitee grant so an asymmetric inviter bonus stays expressible.
  earn_invite_inviter: 500
  # [G3] Twinkle granted to the newly-signed-up friend on a valid signup (the invite earn
  # path); credited exactly once per signup.
  earn_invite_invitee: 500
  # [G3] The single v1 payment-pack grant a verified Charge credits to additional balance
  # (a multi-pack table is content, not a scalar; the price structure is product config).
  charge_pack: 100

force_sim:
  # Synapse spring coefficient; stronger synapses pull their neurons toward link_distance faster.
  charge: 0.035
  # Target rest length for neuron-to-neuron synapse springs in layout units.
  link_distance: 12
  # Center pull coefficient; connectivity scales this so self-relevant nodes settle nearer the origin.
  center_strength: 0.018
  # Barnes-Hut repulsion coefficient for baseline pattern separation.
  repulsion: 2.4
  # Per-tick alpha cooling, tuned for stable convergence without freezing the first launch.
  tick_alpha_decay: 0.022
  # Velocity retained per tick (1 = no damping); lower settles the layout faster but stiffer.
  velocity_damping: 0.62
  # Alpha floor so the layout keeps a little residual motion instead of freezing hard.
  min_alpha: 0.02
  hippocampus_z_min: 0
  hippocampus_z_max: 10
  neocortex_z_min: 15
  neocortex_z_max: 25
  seed: 190019

diary_reader:
  # [D2] GetDiaries pagination page size: diary entries fetched per page, keeping a long
  # reader-app archive lazy. The FE fetch reads this; the BE read may reuse the Go constant as
  # its default/clamp so a client cannot request an unbounded page.
  page_size: 20

deletion:
  # [X1][X4] LTD step passed to Depress when a removed memory withdraws its contribution from a
  # SHARED (kept) neuron's synapse. An absolute strength decrement (Depress clamps to 0..strength_cap):
  # conservative so a delete visibly thins the shared bond without erasing it — the base is never
  # deleted and the neuron keeps its other, stronger bonds (fresh same-memory edges start ~0.32).
  contribution_weaken_amount: 0.15

release:
  # [X2] The full-delete restore window: a diary release is a soft-delete kept restorable for this
  # many real-clock (wall-clock UTC) days, after which the retention sweep hard-deletes it. The single
  # boundary of the "30 days to change your mind" promise — real-world time, not universe-time, so it
  # is independent of launches/recalls. Only full delete uses it; letting-go is permanent and has NO
  # timer key (that absence is the [X5] guarantee).
  soft_delete_retention_days: 30
