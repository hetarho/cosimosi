# cosimosi — 정전 수치의 단일 출처 (canonical values · "밸런스 패치" 파일)
#
# 이 파일이 진짜 출처다. FE(TypeScript)·BE(Go) 상수는 여기서 "생성"된다 — 코드를 직접 고치지 말고
# 이 숫자를 고친 뒤 `pnpm gen:values`를 돌려라(게임 밸런스 패치처럼). 생성물(둘 다 커밋, GENERATED):
#   - frontend/src/shared/config/values.gen.ts   (DO NOT EDIT)
#   - backend/internal/values/values_gen.go       (DO NOT EDIT)
#
# 규칙:
#   - 여기엔 *튜닝 노브* 만 둔다 — 유한 스칼라, 또는 숫자 배열(평평/중첩, 예: 축별 [base, gain]).
#     공식·알고리즘(λ_eff 식, force 적분, HSV 변환)은 코드/스펙에 남긴다.
#   - 콘텐츠 표는 코드/스펙이 출처다: 테마 CSS, mood 색표(palette MOOD/SPACE)·mood 무드원형 좌표
#     (MOOD_AFFECT) 등 — 문자열·분류 표는 여기서 안 다룬다(생성기는 숫자만 받는다).
#   - 카운트라도 *배열 길이에서 파생*되는 것(테마 수·mood 수)은 선언하지 않는다. 다만 튜닝용 상한
#     (knn_k·lights_k·max_segments 같은 cap)은 노브이므로 여기 둔다.
#   - 비유한값(Infinity/NaN) 금지 — "그 이상 전부" 단계는 유한 경계 배열로 표현한다(synapse strand).
#   - proto enum·DB 스키마는 buf/sqlc가 출처다. 인프라(포트·타임아웃·재시도·crypto·캐시 TTL)는
#     env/config.go가 출처다 — 여기 두지 않는다.
#   - 그룹·키는 snake_case. 생성기가 FE는 camelCase(VALUES.decay.aMin),
#     BE는 PascalCase const/var(values.DecayAMin)로 펼친다. 배열은 FE readonly tuple,
#     BE []float64 / [][]float64 (var)로 나간다.

# ═══════════════════════════════════════════════════════════════════════════════════════════
#  1) 엔진·도메인 — 두 런타임이 같은 수를 써야 하는 노브 (여기가 유일한 cross-language 출처).
#     예전엔 FE·BE에 같은 숫자를 따로 하드코딩하고 "함께 바뀌어야 함" 주석으로 버텼다 → 드리프트 위험.
# ═══════════════════════════════════════════════════════════════════════════════════════════

# ── 망각·감쇠 (decay) — FE 클라이언트 렌더 계산 + BE 휴면 컷오프 (헌법3). spec 12·26 ──────────
decay:
  a_min: 0.05 #            밝기 바닥 — 별은 0으로 꺼지지 않는다(헌법2). 잠든 별 잔광. 별 밝기=자기-거리(R_MAX→a_min)·시냅스 밝기·휴면 컷오프의 단일 바닥. 둘째 floor 금지.
  half_life_days: 30 #     시간 감쇠 반감기: activation(Δt)=exp(-ln2/30·Δt), 30일 → 0.5. 시냅스 밝기(spec 12)·휴면 판정 입력(별 밝기는 거리 함수 — spec 38 change 19)
  dormant_factor: 2 #      휴면 컷오프 = dormant_factor·a_min (raw activation 기준). FE isDormant·BE dormancyThreshold 공유.

# ── 야간 공고화 (consolidation) — BE 서버 그래프 야간 패스(재안정화·재분배·spread·재가중·요지·가지치기·재-KNN).
#    반지름은 change 18 공식(R_MIN 6~R_MAX 80)을 서버가 원자료로 근사한다. spec 27 change 20 ──────────────
consolidation:
  hour_utc: 19 #                  깨어나는 시각(UTC) — 04:00 KST(=19 UTC)
  redistribute_lerp: 0.6 #        재분배: 호스트 성단 centroid로 끌어들이는 비율
  radius_scope: 60 #              반지름 스코프: 중심거리(change 18 반지름) 이 값 이하 별만 재안정화·재분배. 밖(표류한 별)은 밤마다 안 끌어옴(망각 존중)
  temporal_link_decay: 0.97 #     재가중: temporal 계열(intra_entry·temporal) weight 곱 — 밤마다 약화("그때 같이 썼다"는 시간창이 풀린다)
  semantic_link_gain: 0.01 #      재가중: semantic 링크 weight 증가분(상한 connection.semantic_weight_cap — "의미가 닮았다"는 장기 보존)
  spread_strength: 6 #            spread: 재분배 후 성단별 결정론적 변위(world units, seed=성단 root id 해시) — 한 점 뭉침 방지
  gist_stage_radii: [40, 55, 68, 78] # 요지화 단계 임계 4개(반지름) — 별 반지름이 넘긴 임계 수 = abstraction_stage(0~4, 단조 GREATEST)
  weak_edge_threshold: 0.2 #      가지치기: weight 이보다 낮고…
  weak_edge_idle_days: 14 #       …이만큼(일) 안 쓰인 선이 대상. 단 별마다 최강 링크 1개는 보호(degree≥1 — 완전 고립 금지)
  weak_edge_floor: 0.05 #         가지친 선이 내려가는 바닥(밝기만↓ + severed 플래그, 삭제 없음 — 헌법2)
  reknn_min_age_days: 7 #         재-KNN: 이보다 오래된 별 중 건강한(weight≥weak_edge_threshold·미severed) 링크가 없는 고립/끊긴 별만 의미 KNN 재실행

# ── 포스 레이아웃 (force_sim) — FE force-sim(sim.ts/octree.ts/seed.ts) ＝ BE 야간 재배치
#    (consolidate.go layout*). 같은 force 모델이라 서버 캐시 좌표가 클라가 정착하는 좌표와 동치여야
#    한다(spec 27 수용 2.1). spec 07·22·38 ───────────────────────────────────────────────
force_sim:
  theta: 0.9 #              Barnes-Hut 근사 임계(s/d) — 클수록 거칠고 빠른 반발 근사 (FE 전용)
  repulsion: -30 #          반발 전하(음수): 별끼리 밀어내는 세기
  link_distance: 30 #       스프링 안식 거리(성단 스케일): 연결된 별을 이 거리로 당김
  center_gravity: 0.01 #    원점 인력(radius=0 노드) — 레이아웃이 멀리 떠내려가지 않게
  velocity_decay: 0.6 #     틱당 속도 감쇠(마찰): 작을수록 빨리 정착
  alpha_min: 0.001 #        수렴 바닥: alpha가 이 아래면 정착으로 보고 멈춤
  radial_strength: 0.08 #   각 노드의 목표 강도-쉘 반지름으로 당기는 스프링 계수(spec 38) (FE 전용)
  link_strength: 1.0 #      각 간선 weight 위에 곱하는 스프링 강도 배수
  max_speed_factor: 2 #     틱당 변위 상한 = max_speed_factor·link_distance (발산 방지) (FE 전용)
  alpha_decay_ticks: 300 #  d3식 alpha 감쇠 지평: ~이 틱 수에 alpha_min으로 정착 (양쪽 1/300 동일)
  min_dist: 1 #             스프링 거리 바닥: 겹친 노드가 0으로 나눠 폭주하는 것 방지
  min_dist2: 1 #            반발 거리² 바닥(역제곱 법칙): ~겹친 두 물체의 힘 상한
  seed_radius: 30 #         BE 미캐시 별의 피보나치 시딩 쉘 반지름(≈ link_distance) (BE 전용)
  seed_heat_floor: 0.1 #    FE 새 별 시드: 모든 연결 성단이 조금씩 당기는 바닥 weight(가장 hot한 곳이 지배, spec 22) (FE 전용)

# ── 연결 규칙 (connection) — BE 링크 형성(worker.go) ＝ FE 데모 시뮬(simulate.ts)·TimeWindowDemo.
#    intra_entry_weight는 link.sql(sqlc)에도 리터럴로 박혀 있다 — SQL은 생성 const를 import 못 하니
#    그쪽은 주석으로 동기 표시. spec 05·21 ─────────────────────────────────────────────────
connection:
  knn_k: 8 #                  링크 후보로 보는 top-k 최근접(candidateK = knn_k·2 파생)
  weight_alpha: 1.0 #         w0 = clamp(α·cos_sim + temporal_bonus, 0, 1) 의 α
  temporal_bonus_max: 0.3 #   같은 날 두 글에 더하는 시간 보너스 최대치(window 끝에서 0)
  temporal_window_days: 7 #   시간 보너스가 0으로 선형 감쇠하는 창(일)
  semantic_weight_cap: 0.79 # 교차-글 의미 링크 weight 상한 — intra_entry(0.8) 바로 아래로 유지
  intra_entry_weight: 0.8 #   한 일기 내 조각끼리 묶는 고정 weight(같은 사건이 가장 강한 결속)
  emo_alpha: 0.1 #            감정 유사도 가중(change 21): w0 = clamp(α·cos + temporal + emo_alpha·emoSim, 0, 1). emoSim=두 별 정동(valence·intensity) 원형 거리(∈[0,1]). 후보 게이트(cos≥0.75)·semantic_weight_cap은 불변 — 감정은 이미 의미로 후보가 된 링크 weight만 미세 조정. 0이면 기존 동작.

# ── 흥분성·경쟁 할당 (excitability) — BE worker.go. FE는 tau_hours만 미러(hot 창). spec 22 ──────
excitability:
  tau_hours: 6 #         흥분성 시간상수 τ: e(c,t)=Σ exp(-Δt/τ). ~6h 할당 창(반감기 ≈4h). FE hot 창도 이 값.
  w_exc: 0.25 #          score = cos_sim + w_exc·norm_e 의 흥분성 편향 가중치
  biased_k: 5 #          흥분성 재랭킹 뒤 최종 유지 링크 수(≤ candidate_k)
  inhibit_decay: 0.5 #   소프트 억제: 한 성단이 조각을 흡수할 때마다 그 e에 곱함(독점 방지)

# ── 재공고화 리셰이핑 (reshape) — BE memory/service.go. FE 데모(data.ts)가 같은 수를 미러. spec 23 ──
reshape:
  pe_threshold: 0.15 #         예측오차 게이트: 이 미만 회상은 단순 재점화(리셰이프 없음)
  base_step: 0.22 #            pe=1·strength=0에서의 리셰이프 강도 천장(magnitude = base_step·pe·(1-strength))
  min_bright_step: 0.10 #      리셰이프당 밝기 오프셋 스텝 하한 clamp
  max_bright_step: 0.22 #      리셰이프당 밝기 오프셋 스텝 상한 clamp
  brightness_offset_max: 1.0 # 누적 밝기 오프셋 경계(±) — clamp(base+offset, a_min, 1) 끝을 이미 포화
  neighbor_factor: 0.4 #       1-hop 이웃에 적용하는 리셰이프 스텝 배율(회상 별보다 작게)
  hue_gain_deg: 60 #           스텝당 색상 지터 = magnitude·hue_gain_deg(도)
  hue_max_deg: 28 #            감정 정박 색에서 벗어날 수 있는 누적 색상 경계(±도)
  form_gain: 0.5 #             스텝당 form-seed 지터 = magnitude·form_gain
  form_delta_max: 0.6 #        누적 form_seed_delta 경계(±)
  strength_recall_gain: 0.15 # 공고화 strength 계수(log2(1+co_recall)): 자주 회상될수록 덜 변형
  age_gain: 0.30 #             공고화 strength 계수(정규화 나이): 오래될수록 덜 변형
  age_ref_days: 90 #           별 나이를 [0,1]로 정규화하는 기준 나이(일)

# ── 기억 가중치 (memory_weight) — Bjork 저장/인출 강도. FE 순수 모듈(weight.ts)이 R·S를 계산하고
#    자기근접 반지름(38)+감정 순위(배경)를 함께 구동한다. 서버는 recall_count 원자료만 영속. spec 07·25·38 ──
memory_weight:
  storage_base: 1.0 #        부호화 기본 저장강도(회상 0회 별의 S 바닥) — S=(storage_base+recall_count)·(1+emo_consolidation·intensity)
  emo_consolidation: 0.6 #   정서 강도(intensity)가 회상당 공고화를 키우는 계수(정서적 기억일수록 깊이 새겨짐)
  tau0_days: 14 #            기본 인출 반감기상수(일): R=exp(-Δt/τ(S)), 회상 0·정서 0의 별 τ 바닥
  tau_storage_gain: 0.8 #    저장강도→τ 성장 계수: τ(S)=tau0_days·(1+tau_storage_gain·ln(1+S)) (분산효과: 잘 공고화된 기억은 천천히 잊힘)

# ── 재공고화 AI 내용 변형 (rewrite) — BE 비동기 잡(spec 54). 충분히 추상화된 별을 다시 열람하면 AI가 표시
#    내용을 단계만큼 흐리게 다시 쓴다(원본 record 불변·헌법1). 단계별 변형 폭은 프롬프트(코드 자산)가 정하고
#    여기엔 트리거 임계·빈도 제한 스칼라만 둔다(프롬프트 문구는 values 아님). ───────────────────────────
rewrite:
  stage_threshold: 2 #   abstraction_stage 이 값 이상이면 재열람 시 AI 내용 변형(미만은 무변, A1). gist_stage_radii 기준 단계.
  debounce_hours: 24 #   같은 별 재변형 최소 간격(시간) — 짧은 시간 과도 재변형 방지(빈도 제한, A6).

# ── 환경 무드 (ambient) — arousal seam(흥분성 게인). spec 22·25·07 ─────────────────────────────────
#    spec 07로 mood 종합(tau_mood_days·lights_k·light_min_share·window_tau_factor)은 은퇴 — 클라가 Σ R에서
#    감정 순위·arousal을 파생한다. spec 38 change 19로 relevance(요즘 토픽 중심벡터)도 폐기. arousal_gain만 남는다.
ambient:
  arousal_gain: 0.3 #          흥분성 게인 g = 1 + arousal_gain·arousal (gain∈[1,1.3]) — 22 seam 보존 (FE·BE 공유)
  bg_brightness_gain: 0.35 #   arousal→배경 스킨 전역 밝기 게인(격동한 요즘=밝게, 평온=잔잔) (FE 전용)
  bg_motion_gain: 0.6 #        arousal→배경 스킨 휘젓는 움직임 세기 게인 (FE 전용)
  valence_warm_gain: 0.12 #    valence→따뜻함 이동 계수(+v 따뜻, -v 차갑게) — 자아 몸체색 보정 (FE 전용)
  valence_sat_gain: 0.25 #     valence→채도 이동 계수(+v 채도↑) — 자아 몸체색 보정 (FE 전용)

# ── 회상 강화 (recall) — FE 전용(co-recall.ts). 서버 ReinforceLinks는 delta를 payload로 받는다. spec 11 ──
#    간격 효과(spacing)는 change 22로 제거 — 강화량은 간격 무관 고정(co_recall_delta). 몰아보기 1× = 하루 띄움 1×.
recall:
  co_recall_delta: 0.05 #   공동 회상 1회당 링크 weight 증가분(상한 1.0, 간격 무관 고정). HebbianDemo도 이 값.
  dwell_ms: 2000 #          능동 보기 dwell 임계(ms): 이만큼 봐야 회상/공동회상 누적

# ── 분절 추출 (extraction) — BE ai/extractor.go. 프롬프트 루브릭의 "1~5"도 함께 바뀜. spec 20 ──────
extraction:
  max_segments: 5 #   한 일기를 쪼개는 사건 분절(별) 최대 수. 초과분은 마지막 분절에 병합. 분절 [1,5].

# ── 초대 멤버십 게이트 (invite) — spec 41. code_length만 BE 코드 생성 ↔ FE 입력 셀이 공유,
#    나머지는 /invite·발행 UI의 FE 전용 연출 노브(렌더 birth_dur_s 류와 동류지만 게이트 묶음으로 한곳에) ──
invite:
  code_length: 8 #                     발행 코드 길이 — BE crypto/rand 생성 ↔ FE 입력 셀 수 공유
  timed_preset_hours: [24, 168, 720] # 시간지정 발행 프리셋(1일·7일·30일) (FE 전용)
  validate_debounce_ms: 400 #          /invite 인라인 검증 디바운스(ms) (FE 전용)
  char_stagger_ms: 60 #                코드 셀 등장/입력 stagger(ms) (FE 전용)
  celebrate_ms: 1200 #                 redeem 성공 환영 연출 길이(ms) (FE 전용)

# ── 커스터마이즈 — 4축 외형 소유권·별가루 경제 config(spec 44). 가격·무료여부·시작 잔액은 *config*라
#    여기 단일 출처를 둔다 — FE는 가격/잠금 표시에, BE는 구매 검증에 같은 수를 쓴다(FE/BE 하드코딩·표류
#    금지, A14). 아이템 *시각 정의*(셰이더/형태/swatch/이름)는 코드 카탈로그(entities) 소관이라 여기 없다.
#    별가루(Stardust)는 시작 잔액만 있고 충전·결제는 비목표 — 차감만, 음수 불가(A3). ──────────────────
customization:
  starting_stardust: 100 #   신규 사용자 시작 별가루(GetInventory 첫 호출에서 멱등 시드, A1).
  # 유료 아이템 가격(별가루). 키 = 아이템 안정 id — 배경은 `"background:<kind>"`, 형태 있는 3축(별·나·
  # 시냅스)은 **형태·표면을 따로 판다**(spec 52): `"<axis>:form:<id>"`·`"<axis>:surface:<id>"`. 콜론은
  # 의도적 식별자라 YAML에서 반드시 따옴표. 이 맵의 키 집합 = BE "유효 유료 id 화이트리스트"(코드 카탈로그가
  # 시각을 정의, 가격이 판매 여부를 정의). 합성 선택은 양쪽 sub-item을 소유(또는 무료)해야 저장된다(BE 검증).
  price:
    'background:vortex': 30
    'background:crystal': 30
    'background:mandala': 40
    # 별 — 형태(form)
    'star:form:octa': 25
    'star:form:smooth': 25
    'star:form:cloudy': 30
    'star:form:liquid': 30
    # 별 — 표면(surface)
    'star:surface:glossy': 25
    'star:surface:lava': 30
    'star:surface:cloud': 30
    'star:surface:pulse': 30
    # 나 — 형태/표면
    'self:form:cube': 25
    'self:form:bloom': 30
    'self:surface:prism': 25
    'self:surface:neuron': 30
    # 시냅스 — 형태/표면
    'synapse:form:branched': 25
    'synapse:form:dotted': 25
    'synapse:surface:beads': 30
    'synapse:surface:steady': 25
  # 축별/슬롯별 무료 1종 kind(묵시 소유 — 소유 행 없이 누구나 선택). itemId = `"<키>:<kind>"`로 조립되므로
  # 배경은 키 `background`, 형태 3축은 슬롯 키 `"<axis>:form"`·`"<axis>:surface"`로 둔다(A5). 무료 합성 프리셋:
  # 별 lowpoly+facet · 나 orb+mirror · 시냅스 strands+flow · 배경 galaxy. 무료 매핑의 단일 출처(A11).
  free:
    background: galaxy
    'star:form': lowpoly
    'star:surface': facet
    'self:form': orb
    'self:surface': mirror
    'synapse:form': strands
    'synapse:surface': flow

# ── 관리자 콘솔 (admin) — 사용자 목록 keyset 페이지네이션 노브(spec 46). FE는 다음-페이지 요청에,
#    BE는 page size 기본/상한 클램프에 같은 수를 쓴다(FE/BE 하드코딩·표류 금지, A12). ──────────────
admin:
  user_list_default_page_size: 50 #   ListAdminUsers page_size 미지정 시 기본
  user_list_max_page_size: 100 #      page_size 상한(이보다 크면 캡)

# ═══════════════════════════════════════════════════════════════════════════════════════════
#  2) 렌더 — FE 전용 3D 우주 표현 노브. BE 생성물(values_gen.go)에도 나가지만 서버는 안 쓴다.
# ═══════════════════════════════════════════════════════════════════════════════════════════

# ── 자기-정박 방사 레이아웃 (radial_layout) — 강도-쉘 우주(live + overlay 공유). spec 38·40 ─────
radial_layout:
  repulsion: -18 #          강도-쉘 우주용 force-sim 반발 오버라이드
  link_distance: 14 #       스프링 안식 거리 오버라이드(촘촘한 별자리)
  radial_strength: 0.1 #    방사-쉘 스프링 강도 오버라이드(거리=강도)
  r_min: 6 #                가장 안쪽(가장 강한 기억) 쉘 반지름 — 자기 별 바로 바깥
  r_max: 80 #               가장 바깥(휴면) 쉘 반지름 — 표류 여유(40→80). 경계는 유지(무한 표류 아님), 가장자리 별은 각도 드리프트로 회전
  # (spec 07) 옛 strength 혼합(w_activation·w_intensity)은 은퇴 — targetRadius가 Bjork 인출 강도 R을 직접 받는다.
  # 연결 가중 차등 표류(spec 38): 연결성(degree+Σweight)이 인출 τ를 늘려 감쇠를 늦추기만 한다(λ_eff와 같은 방향, 절대 가속 안 함). conn=0이면 memoryR와 동일.
  conn_drift_alpha: 0.6 #   연결성→τ 성장 계수: τ_conn = τ(S)·(1 + conn_drift_alpha·connectedness). 연결 강할수록 천천히 멀어짐
  conn_weight_term: 0.5 #   연결성 합성에서 Σweight 항 가중(degree count 대비). 0이면 순수 count 폴백
  sat_gamma: 0.6 #          포화 재매핑 지수: radius = r_min + (r_max-r_min)·(1 - R^sat_gamma). <1이면 먼 구간(R→0)이 R_MAX에 일찍 안 붙고 계속 표류. 1이면 옛 선형
  drift_step_rad: 0.08 #    별 방향의 밤당 접선 회전(~4.6°/밤 표상 드리프트, 수작업 튜닝)

# ── 별 렌더 (star_render) — StarField 인스턴스. spec 08 ──────────────────────────────────────
star_render:
  size_base: 0.6 #          별 인스턴스 스케일 기준 (final = size_base + intensity·size_range)
  size_range: 1.4 #         intensity가 더하는 스케일 폭
  birth_dur_s: 1.2 #        별 탄생 스케일-인 애니 길이(s, easeOutBack 팝)
  burst_dur_s: 1.6 #        탄생 버스트(글로우 디스크) 수명(s)
  burst_base_scale: 2.5 #   탄생 버스트 시작 스케일(별 스케일 배수)
  burst_grow: 16 #          탄생 버스트가 수명 동안 퍼지는 추가 배율
  burst_fade_gain: 1.2 #    탄생 버스트 페이드 게인((1-age)²·gain). 별 본체가 self-light로 어두워져 상대적으로 도드라지므로 1.6→1.2 하향(spec 43/03)

# ── 별 형태 (star_form) — 기억-상태가 굴리는 고유 실루엣 + 추상화 단계 단순화(spec 53). buildStarBody의
#    form 빌더가 per-instance 3축 시드(seedComponents)·abstraction_stage로 정점을 변위/단순화한다. 색·크기·
#    밝기 규칙은 불변(회귀 경계 A5). 단일 InstancedMesh(헌법8)라 정점 변위는 in-shader. FE 전용. ─────────
star_form:
  displace_amp: 0.13 #     저주파 정점 변위 진폭(별마다 다른 실루엣 럼프). 반지름 1 대비 작게 — 크기 규칙(f(intensity)) 보존(A5).
  detail_amp: 0.06 #       고주파 디테일 변위 진폭 — 추상화가 진행되면 럼프보다 먼저 녹는다("디테일").
  asymmetry: 0.22 #        seed 방향 비대칭 스트레치(평균 기준 편차라 균일 확대 없음 — 비율만 변형). 회전만이 아닌 형태 차이(A1).
  stage_simplify: 0.75 #   최대 추상화 단계에서 변위·비대칭이 줄어드는 비율(요지화 — 1이면 단계4에서 거의 일반형, A2 단조). stageMax는 consolidation.gist_stage_radii 길이에서 파생.

# ── 별 조명 (star_lighting) — 자아-별 광원(반사=최근성) + 배경 평행광. spec 03·38·42 ──────────────
#    별 빛 3겹 중 "반사(lit)" 채널: 중앙 자아-별(우주) 또는 우상단 평행광(배경)으로 별 면/엣지를 드러낸다.
#    진짜 THREE.PointLight 객체가 아니라 buildStarBody의 emissiveNode TSL 그래프 안에서 self-position
#    uniform + per-instance 좌표로 N·L·falloff를 직접 계산(헌법8 단일 InstancedMesh 보존).
star_lighting:
  self_intensity: 0.9 #         자아-별 반사광 세기(우주 reflection 채널 기본 광도) — 나에게서 나오는 빛이 과해 10% 하향
  self_distance: 50 #           거리 falloff 기준(쉘 r_max=40 밖 여유 — r_max 별도 완전 흑색 아니게, 헌법2)
  self_decay: 0.7 #             거리 falloff 지수(물리 1/d² 아님 — 완만; recency를 r_min~r_max 동적 범위에 가시화)
  lit_albedo_gain: 0.4 #        반사가 self-glow를 못 이기게 cap + bloom threshold(0.1) 아래로 묶어 'lit은 bloom 안 함' 자연 분리
  lit_mix: 1.0 #                반사 항 게이트(우주·배경 1, 저사양/WebGL2는 소비처가 0으로 광 연산 분기 제거)
  ambient_fill: 0.4 #           카메라 반대편(어두운 반구) 채움광(하드코딩 ambientLight 0.4 이전; reflection과 이중계상 시 하향)
  backdrop_light_dir: [0.6, 0.7, 0.4] # 배경 CosmosScene 우상단 평행광 방향(positional=0, 화면-비대칭 없음 = 태양)
  backdrop_light_intensity: 0.7 #       배경 평행광 세기(은은하게 — 면/엣지 드러내되 오늘 룩 안 깨게)
  recall_light_back_offset: 6 #  recall(근접 탐험)에서 자아 광원·아바타가 카메라 뒤로 물러나는 거리(world, −forward) — 어깨 너머(spec 49)
  recall_light_up_offset: 2 #    recall에서 카메라 위로 들리는 거리(world, +up) — 정면 별이 뒤+위 빛으로 입체 음영(spec 49)

# ── 공명 링 (resonance_ring) — 공유 우주 공명 마커. spec 36 ───────────────────────────────────
resonance_ring:
  base_scale: 2.6 #     별 스케일 대비 공명 마커 링 크기
  pulse_scale: 0.12 #   공명 링 맥동 크기 진폭
  pulse_speed: 1.4 #    공명 링 맥동 각속도(rad/s)
  opacity_min: 0.22 #   공명 링 최소 불투명도(맥동 바닥)
  opacity_amp: 0.42 #   공명 링 불투명도 맥동 진폭

# ── 포커스 스포트라이트 (focus) — 별 강조 시 밝기/시냅스 디밍. spec 11·28 ────────────────────────
focus:
  dim: 0.12 #                포커스 중 비-포커스 별 밝기 배수
  boost: 1.3 #               포커스/강조 별 밝기 배수
  synapse_dim_star: 0.1 #    별 포커스 중 전역 시냅스 웹 디밍 배수
  synapse_dim_diary: 0.12 #  일기 프레이밍 중 전역 시냅스 웹 디밍 배수

# ── 시냅스 시각 (synapse) — mapping.ts(순수 매핑) + SynapseFilaments/SynapseDust. spec 19·26 ──────────
synapse:
  width_thin_px: 1 #       얇은 버킷 선폭(px, Line2 전역 폭)
  width_thick_px: 4 #      굵은 버킷 선폭(px)
  thick_threshold: 0.5 #   굵은 버킷 weight 컷오프
  alpha_min: 0.15 #        최소 시냅스 불투명도(약한/휴면 간선도 보인다)
  vitality_cap: 0.12 #     링크 활력 상한(공동 회상 누적의 log 압축 천장)
  vitality_log_div: 4 #    활력 log2 정규화 분모
  pulse_freq: 3.0 #        시냅스 선 맥동 주파수 sin(t·freq) (강화된 간선 반짝임)
  line_width_px: 2 #       단순 시냅스-라인 렌더러의 전역 LineSegments2 선폭(px)
  twist_turns: 2.5 #       필라멘트 다발이 간선 길이 동안 꼬이는 나선 회전 수
  flow_speed: 0.22 #       빛 패킷이 A→B 필라멘트를 따라 흐르는 속도
  # 유사도(연결 강도) 단계별 필라멘트 스타일 표(spec 19). 마지막 단계는 strand_bounds 이상 전부.
  # 평행 배열: tier i = (count[i], radius[i], bright[i], opacity[i]); bounds[i]는 tier i의 상한(미만).
  strand_bounds: [0.35, 0.6, 0.85] #            상한(미만) 경계 3개 → 4단계(마지막은 "그 이상 전부")
  strand_count: [2, 4, 6, 9] #                  단계별 빛가닥 수
  strand_radius: [0.01, 0.018, 0.028, 0.04] #   단계별 가닥 기본 반지름(world units)
  strand_bright: [0.2, 0.32, 0.45, 0.6] #       단계별 발광 베이스(0..1)
  strand_opacity: [0.5, 0.62, 0.72, 0.82] #     단계별 불투명도 베이스(0..1)

# ── 씬 블룸 (bloom) — 밝은 HDR 별/필라멘트를 확산광으로. ─────────────────────────────────────────
bloom:
  strength: 0.9 #    블룸 세기
  radius: 0.5 #      블룸 반경
  threshold: 0.1 #   블룸 임계(이 이상 밝기만 번진다)

# ── 공유 우주 씬 (cosmos) — CosmosScene 배경 합성 노브(사인인·초대·랜딩). spec 43 ────────────────
cosmos:
  scene_dpr: 1.5 #            CosmosScene 캔버스 렌더 배율 상한([1,n] 클램프; 별 선명도 vs 부하)
  fps_cap: 30 #              배경 애니메이션 프레임 상한(오로라가 느려 60fps 불필요 — 셰이더 평가 절반)
  fluid_octaves: 3 #         fluid fbm 옥타브 수(미세 디테일 vs 비용)
  back_brightness: 0.5 #     뒤 nebula 명도 배율(<1 — 배경답고 깊은 우주 느낌; 별이 묻히지 않게)
  twinkle_count: 90 #        3D 트윙클 별먼지 개수(엠블럼/사인인 기본)
  quality_low_max_cores: 4 # navigator.hardwareConcurrency ≤ 이 값(또는 WebGL2 폴백)이면 quality=low 자동

# (spec 07) 환경 네뷸라(ambient_nebula) 그룹은 은퇴 — 떠 있는 무드 가산광 풀(AmbientNebula)을 제거하고
#    요즘 감정을 배경 스킨 텍스처/톤에 녹였다. 배경 전역 생동 계수는 ambient.bg_*로 이전.

# ── 중앙 자기-별 (self_star) — 가장 강한 기억 쉘 바로 안쪽. spec 38 ───────────────────────────────
self_star:
  radius: 5 #   중앙 자기-별 스케일/반지름

# ── 캔버스 거동 (layout) — 강도 드리프트 재-킥. spec 38 ───────────────────────────────────────────
layout:
  rekick_threshold: 0.5 #   sim 재-킥을 트리거하는 목표-반지름 드리프트(world units)
  rekick_alpha: 0.3 #       쉘이 드리프트할 때 sim을 재-킥하는 alpha

# ── 성진(星塵) (star_dust) — 주변 별먼지 불투명도. ──────────────────────────────────────────────
star_dust:
  opacity_dimmed: 0.14 #   포커스 중 디밍 불투명도
  opacity_normal: 0.5 #    평상 불투명도

# ── 우주 오버레이 (overlay) — 두 하늘 겹쳐보기. spec 37 ──────────────────────────────────────────
overlay:
  tint_strength: 0.16 #   친구 하늘 공통 틴트 블렌드 강도
  sky_offset: 66 #        겹친 두 하늘의 수직 분리(world units)

# ── 공명 다리 (resonance_bridge) — 두 우주 사이 빛-다리. spec 37 ────────────────────────────────
resonance_bridge:
  flow_speed: 0.16 #     공명 다리 빛-패킷 흐름 속도(packets/s)
  base_glow: 0.5 #       공명 다리 기본 글로우
  peak_glow: 1.0 #       이동 패킷 위치의 추가 밝기
  focus_boost: 1.7 #     선택된 공명 쌍 다리 밝기 배수
  line_width_px: 3 #     공명 다리 선폭(px)

# ── 우주 제스처 항행 (gesture) — 메인 우주 캔버스 Pointer Events 입력 튜닝(spec 06, change 08). FE 전용.
#    근접("별들 가까이서 탐험하기") look·thrust + 원거리("멀리서 내 우주 보기") pan·zoom·orbit 노브. ──────
gesture:
  drag_deadzone_px: 8 #              한 손가락 탭 vs 드래그 분리 임계(px) — 이 미만 이동은 탭(별 선택). 기존 8px 계승
  close_thrust_deadzone_px: 6 #      근접 두 손가락 centroid 세로 이동이 추력으로 잡히기 시작하는 deadzone(px)
  close_thrust_full_px: 90 #         근접 추력이 ±1로 포화하는 centroid 세로 이동량(px) — deadzone→full 선형 ramp
  close_look_sensitivity: 2.2 #      근접 한 손가락 드래그 → 시선 회전 감도(캔버스 폭 1회 드래그 ≈ 이 라디안)
  far_pan_speed: 1.0 #               원거리 두 손가락 pan 속도 배수(화면 평면 이동량 → world 이동 스케일)
  far_zoom_scrub_deadzone_px: 8 #    원거리 double-tap-hold 세로 스크럽이 zoom으로 잡히는 deadzone(px)
  far_zoom_scrub_speed: 0.004 #      원거리 zoom scrub 세로 1px당 반경 변화 비율
  double_tap_ms: 300 #               double-tap 인정 최대 간격(ms)
  double_tap_max_dist_px: 24 #       double-tap 두 탭의 최대 거리(px) — 넘으면 별개 탭
  far_rotate_speed: 2.4 #            원거리 arcball 회전 속도(캔버스 폭 1회 드래그당 라디안) — 옛 NEBULA_ROTATE_SPEED
  far_damp: 9 #                      원거리 회전 관성 감쇠(1/s) — 옛 NEBULA_DAMP
  far_zoom_speed: 0.12 #             원거리 wheel/pinch dolly 감도(반경 비율/notch) — 옛 NEBULA_ZOOM_SPEED

# ── 길찾기 카메라 (wayfinding) — "이 일기 별들 보기" 플라이-투. spec 28 ───────────────────────────
wayfinding:
  frame_margin: 1.3 #         프레임-올 카메라 여백 배수(바깥 별이 화면 끝에 붙지 않게)
  frame_min_distance: 12 #    단일 별 프레이밍 시 카메라가 머무는 거리(bounding radius≈0 퇴화 바닥)

# ── 별 미세 부유 (wobble) — StarField 행렬 + SynapseFilaments 셰이더 공유 수식. spec 19 ────────────
#    배열 노브: freq는 축별 [base, seedGain], phase는 축별 위상 배수(x,y,z 순).
wobble:
  amp: 1.0 #                       부유 진폭 — 별이 떠다니는 거리
  freq: [[0.24, 0.2], [0.2, 0.26], [0.16, 0.32]] #   축별 [base, seedGain] 각주파수(rad/s), freq = base + seed·gain
  phase: [1.7, 3.1, 5.3] #         축별 위상 배수 — phase = seed·2π·multiplier

# ═══════════════════════════════════════════════════════════════════════════════════════════
#  3) 데모 — 랜딩/교육용 시뮬(shared/lib/demo). 의도적으로 엔진과 다른 근사값이다(드리프트 아님).
#     주석의 "vs 엔진" 은 일부러 갈라놓은 값임을 표시. 엔진과 같아야 하는 데모 상수는 위 1)을 import 한다.
# ═══════════════════════════════════════════════════════════════════════════════════════════

# ── 데모 링크 빌드 (demo_linking) — simulate.ts/data.ts. spec 05·19·22 ─────────────────────────
#    런타임 새 별 연결(data.ts linkNewDiary)·야간 공고화는 production connection.*·consolidation.* 식을
#    그대로 쓴다(데모 전용 add*/hot·공고화 노브 폐기 — change 25·27). 아래는 *시드 그래프*(simulate.ts)의
#    **임베딩 없는 명시적 근사**만 남는다(change 27 A6 환원 불가 경계 — topic-cosine을 embedding-cosine
#    대역으로). 이 시드는 change 28(데모=시뮬 genesis)이 실엔진 구동으로 대체할 예정이다.
demo_linking:
  knn_k: 5 #                    시드 이웃 링크 top-k (임베딩 근사 — vs 엔진 connection.knn_k=8)
  sim_tau: 0.4 #               시드 이웃 최소 topic-cosine (임베딩 cos의 데모 대역 — vs 엔진 0.75)
  co_recall_bump: 0.1 #        시드 회상 세션이 기존 간선 weight에 더하는 양
  co_recall_base: 0.5 #        시드 회상 세션이 새로 놓는 co_recall 다리 weight(연결-안전망 다리에도 재사용)

# 데모 야간 공고화(data.ts demoConsolidate)는 서버 consolidation.* 정전 값을 그대로 쓴다 — 추상화 단계
# 반지름 트리거 단조 승급·시간링크 약화/의미링크 강화·약한 선 가지치기·re-KNN(change 20·27 충실 포트). 데모
# 전용 demo_consolidation 노브는 폐기(드리프트 방지 — 단일 출처).

# ── 데모 오버레이 (demo_overlay) — simulate.ts/data.ts. spec 37 ─────────────────────────────────
demo_overlay:
  max_bridges: 4 #   두 데모 우주 사이 공명 빛-다리 최대 수

# ── 데모 연속 시계·배속 (demo_clock) — clock.ts/use-demo-flow rAF 드라이버. change 24 ────────────────
#    데모 가상 시계가 배속으로 계속 흐른다(정지는 배속 미적용 — UI 옵션이라 여기 없음). 04:00 KST 야간
#    공고화 발화 시각은 엔진 consolidation.hour_utc를 재사용(드리프트 없음). FE 데모 전용(서버 미사용).
demo_clock:
  hours_per_second: [1, 6, 24] #  배속 옵션: 실제 1초당 흐르는 가상 시간(시). 첫 값(1)이 기본 배속. 24=하루가 1초.
  step_ms: 300 #                  가상 시계를 흘리는 간격(ms) — rAF 매 프레임이 아니라 이 간격마다 한 번에 offset을 전진시키고 재파생·공고화·무효화를 묶는다. 사이 프레임엔 시계가 멈춰 있어 force-sim이 자리를 잡고(settle) 카메라/입력에 메인스레드를 양보한다(부드러움의 핵심). 작을수록 흐름이 매끈하나 무거워진다.
  max_tick_ms: 250 #             한 프레임이 step에 보태는 실시간 상한(ms) — 탭이 가려졌다 돌아오거나 메인스레드가 길게 멎어도 한 step이 수십~수백 밤을 한 번에 발화하지 않게 막는다(가려진 동안은 사실상 정지)

# ── 데모 우주 genesis (demo_genesis) — genesis.ts/data.ts. change 28 ───────────────────────────
#    자유모드 진입 = 빈 우주에서 30일을 배속으로 살아가는 시뮬레이션(genesis). 매 simulated day
#    페르소나별 확률로 일기를 쓸지 굴리고(하루 최대 1편), 쓰면 per-persona 프리셋 풀(diary-presets.ts)에서
#    한 편을 뽑아 production 엔진(change 25 조각화 fan-out·27 동치 생성·연결·공고화)으로 별이 태어난다.
#    난수는 입력(작성 여부·템플릿 선택·회상 대상)에만 — 엔진 함수는 입력이 같으면 결정론이라 change 27
#    골든 parity가 안 깨진다. 배열 순서 = PERSONA_ORDER [student, worker, homemaker]. FE 데모 전용(서버 미사용).
demo_genesis:
  days: 30 #                              genesis 일수 — 빈 우주에서 며칠을 살아낸 뒤 자유 작성이 열리는지
  daily_write_prob: [0.7, 0.45, 0.85] #   페르소나별 그 날 일기 쓸 확률(student 자주·worker 드물게·homemaker 가장 자주 — 다른 생활 리듬)
  daily_recall_prob: [0.45, 0.3, 0.55] #  페르소나별 그 날 과거 별 회상 확률(0=비활성). 회상이 거리/밝기 드리프트를 살려 우주가 더 살아 있게 한다
  hours_per_second: 24 #                  genesis 자동 재생 배속(실 1초당 가상 24시간 — 하루≈1초 관전, 30일≈30초). genesis 동안 사용자 배속 컨트롤은 잠긴다

# ── 데모 투어 항해 실습 (demo_tour) — DemoGuidedTour 실습 phase 자동 진행 임계값. plan 48·change 12 ──
#    투어가 navigation-input 누적 카운터·항해 FSM 모드를 rAF로 샘플링해 임계 도달 순간에만 다음 phase로.
demo_tour:
  rotate_threshold_rad: 0.9 #       멀리서 회전 실습: nebula 궤도 회전 누적 각(rad) 임계
  zoom_ratio_threshold: 0.25 #      멀리서 줌 실습: nebula 줌 반경 변화 누적 비율(|fraction| 합) 임계
  look_threshold_rad: 0.9 #         가까이서 시선 실습: recall look 회전 누적 각(rad) 임계
  thrust_distance_threshold: 8 #    가까이서 전진 실습: recall 전진 누적 거리(world 단위) 임계
