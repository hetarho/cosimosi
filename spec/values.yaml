# Build-time tuning constants generated by `pnpm gen:values`.
# Groups and keys use snake_case; generated consumers expose camelCase TS keys
# and PascalCase Go constants.
#
# Put product-shaping constants here: thresholds, caps, coefficients, defaults,
# debounce/delay windows, numeric arrays, and explicit scalar lookup tables.
#
# Keep these out of values.yaml: runtime env, secrets, URLs, DSNs, API keys,
# feature flags, proto contracts, SQL schemas, formulas, UI copy, theme CSS, and
# arrays whose length can be derived from their content.
client_cache:
  # TanStack Query defaults shared by web and mobile cache providers.
  default_stale_ms: 30000
  default_gc_ms: 300000
  default_retry_count: 1
  optimistic_rollback_ms: 10000
