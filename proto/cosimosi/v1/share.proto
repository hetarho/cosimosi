syntax = "proto3";

package cosimosi.v1;

option go_package = "github.com/cosimosi/backend/internal/gen/cosimosi/v1;cosimosiv1";

// share.proto is the universe-sharing contract (spec 35): an owner publishes their
// universe's LANDSCAPE — star placement, colors, clusters, synapses, sky — at a
// guess-proof URL, while the diary text behind every star stays private on EVERY path.
//
// Two services with DELIBERATELY different exposure (spec 35 설계 요점):
//   - ShareService  — AUTHENTICATED owner settings (toggle/name/rotate). Same auth chain
//                     as MemoryService; user_id = JWT sub (no cross-user access path).
//   - VisitService  — UNAUTHENTICATED public read, ONE rpc. Isolated as its own service so
//                     the no-auth interceptor chain attaches to it ALONE (fail-closed): an
//                     allowlist typo can't leak another rpc, because no other rpc shares the
//                     public surface (acceptance 3.1).
//
// Like the other contracts this is a DTO layer only (constitution §5) and unary only
// (constitution §6). Reuses Mood / Settings from memory.proto (the visual landscape is the
// owner's spec-30 appearance; 07로 요즘-감정 sky 종합은 은퇴 — 방문자가 별에서 직접 파생).

import "cosimosi/v1/memory.proto";

// SharedStar is the PUBLIC projection of a star: emotion (→ color), intensity (→ size),
// and DAY-quantized timestamps for the client's decay/form math. There is NO memory_id,
// NO record_id, NO fragment text, NO precise timestamp field — content-zero is a TYPE
// guarantee, not an omission (acceptance 1.1). The response-array INDEX is the star's id
// (synapses reference it); coordinates are never sent (constitution §3 — the visitor's
// force-sim re-derives placement, so each visit is subtly, intentionally different).
message SharedStar {
  Mood mood = 1;                // 13 emotions (spec 29) → star color
  double intensity = 2;         // 0..1 arousal → size/presence
  // ⚠️ DAY-quantized (epoch days = unix_seconds / 86400), NOT a precise instant — quantizing
  // blunts behavioral fingerprinting (when exactly the owner journals/recalls) while still
  // letting the client run decay (last_recalled_day) and form (created_day) math.
  int64 last_recalled_day = 3;
  int64 created_day = 4;
}

// SharedSynapse links two SharedStars by their response-array INDEX (a, b). Only weight is
// sent (drives thickness/brightness in the client shader) — no ids, no activation time.
message SharedSynapse {
  int32 a = 1;
  int32 b = 2;
  double weight = 3;
}

message GetSharedUniverseRequest {
  string slug = 1; // base64url 22-char (128-bit) public slug
}

message GetSharedUniverseResponse {
  reserved 5;
  reserved "ambient";
  string display_name = 1;         // owner-chosen name ("" = anonymous, client renders "어느 우주")
  repeated SharedStar stars = 2;
  repeated SharedSynapse synapses = 3;
  Settings appearance = 4;         // 30: owner visual overrides (background theme · object · emotion colors)
  // 07: 요즘-감정 sky 종합(옛 ambient=5)은 은퇴 — 방문자가 SharedStar 분포에서 직접 파생한다.
}

// VisitService is the ENTIRE unauthenticated surface (acceptance 3.1). ⚠️ Adding an rpc here
// publishes it to the anonymous internet — only ever add reads that are safe with no caller
// identity, and that carry NO private content.
service VisitService {
  rpc GetSharedUniverse(GetSharedUniverseRequest) returns (GetSharedUniverseResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}

message GetShareSettingsRequest {}

// ShareSettings is the owner's row. slug is "" until sharing is first enabled (acceptance 1.4
// mints it then). enabled=false ⇒ the slug returns NotFound to visitors (acceptance 1.2).
message GetShareSettingsResponse {
  bool enabled = 1;
  string slug = 2;         // "" when never enabled
  string display_name = 3;
}

// Partial-ish update: enabled + display_name. The FIRST enable mints the slug
// (acceptance 1.4). display_name "" = anonymous.
message UpdateShareSettingsRequest {
  bool enabled = 1;
  string display_name = 2;
}

message UpdateShareSettingsResponse {
  bool enabled = 1;
  string slug = 2;
  string display_name = 3;
}

message RotateShareSlugRequest {}

// Rotating issues a fresh slug and INVALIDATES the old one immediately (acceptance 1.3).
message RotateShareSlugResponse {
  bool enabled = 1;
  string slug = 2;
  string display_name = 3;
}

// --- Universe overlay (spec 37) — resonance bridges ---

message GetResonanceBridgesRequest {
  string slug = 1; // the universe being overlaid (the owner)
}

// ResonanceBridge is ONE resonance (spec 36) between the caller and the slug's owner — the
// only cross-universe datum the overlay exposes. It carries NO content: my_memory_id is the
// caller's OWN star (they already hold its text), and their_star_index is the partner star's
// position in THIS slug's GetSharedUniverse response array (so the client can place a bridge
// endpoint without ever learning the partner's memory id — content-zero stays intact, 35).
message ResonanceBridge {
  string my_memory_id = 1;
  int32 their_star_index = 2;
}

// Only the resonance PARTY ever gets a non-empty list — a third-party visitor always gets
// [] (acceptance 2.2), so a resonance's existence is never disclosed to anyone but the two
// people who share it (spec 36 비노출).
message GetResonanceBridgesResponse {
  repeated ResonanceBridge bridges = 1;
}

// ShareService is the AUTHENTICATED owner surface — same auth chain as MemoryService. Each
// rpc reads/writes only the caller's own row (user_id = JWT sub; acceptance 3.2). The overlay
// bridge read is here (NOT on VisitService) because it needs the caller's identity to match
// resonances — the public surface stays content-zero (spec 37 설계 요점).
service ShareService {
  rpc GetShareSettings(GetShareSettingsRequest) returns (GetShareSettingsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  rpc UpdateShareSettings(UpdateShareSettingsRequest) returns (UpdateShareSettingsResponse);
  rpc RotateShareSlug(RotateShareSlugRequest) returns (RotateShareSlugResponse);
  rpc GetResonanceBridges(GetResonanceBridgesRequest) returns (GetResonanceBridgesResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}
