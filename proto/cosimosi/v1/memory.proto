syntax = "proto3";

package cosimosi.v1;

// Import path matches the source-relative output dir (proto path cosimosi/v1/);
// the part after ';' sets the Go package name (cosimosiv1) + connect subpackage
// (cosimosiv1connect). See backend/buf.gen.yaml (paths=source_relative).
option go_package = "github.com/cosimosi/backend/internal/gen/cosimosi/v1;cosimosiv1";

// memory.proto is the single transport contract shared by web + React Native.
//
// It is a DTO layer, NOT the domain (constitution §5): no coordinate fields —
// star positions emerge client-side in the force-sim (constitution §3); the
// server is authoritative only over the weighted graph. unary only — no
// streaming (constitution §6, RN cannot consume server streams).

// Mood is the single source of truth for the 13 moods (4 affective quadrants ×3 +
// neutral; spec 29), shared by BE/FE generated types. records.mood (TEXT, nullable)
// stores this enum's name string. Existing 1–7 are frozen; new 6 appended (wire-compat).
enum Mood {
  MOOD_UNSPECIFIED = 0;
  JOY = 1;
  CALM = 2;
  SAD = 3;
  ANGER = 4;
  FEAR = 5;
  LOVE = 6;
  NEUTRAL = 7;
  EXCITEMENT = 8;
  GRATITUDE = 9;
  RELIEF = 10;
  STRESS = 11;
  TIRED = 12;
  EMPTINESS = 13;
}

// --- SegmentMemory (preview — no persistence) ---

// SegmentDraft is one PROPOSED fragment star: the AI's split of a diary into a
// scene + its detected emotion, returned for the user to review/edit BEFORE
// anything is persisted. The same shape rides RecordMemoryRequest.segments as
// the user-confirmed (possibly edited or manually added) final list.
message SegmentDraft {
  string text = 1;             // fragment text (non-empty)
  Mood mood = 2;
  double intensity = 3;        // 0..1 arousal
  double valence = 4;          // -1..1 signed affect
}

message SegmentMemoryRequest {
  string body = 1;
}

message SegmentMemoryResponse {
  repeated SegmentDraft segments = 1;  // 1..5 proposed fragments, never empty
}

// --- RecordMemory ---

// mood/intensity/valence are OPTIONAL whole-diary hints (spec 21): the AI
// extractor detects per-fragment emotion, so unset values are simply ignored;
// a set hint is only used as the fallback when extraction degrades.
message RecordMemoryRequest {
  string body = 1;
  Mood mood = 2;               // optional hint (manual-emotion toggle)
  double intensity = 3;        // optional hint, 0..1
  string entry_date = 4;       // YYYY-MM-DD
  string idempotency_key = 5;
  double valence = 6;          // optional hint, -1..1 (0 = unset/neutral)
  // User-confirmed fragment list from the SegmentMemory review step. When
  // non-empty the server persists EXACTLY these as the fragment stars in the
  // same transaction as the record (no async extract job) and memory_ids is
  // populated in the response. Empty = legacy async-extract path.
  repeated SegmentDraft segments = 7;
}

// With request.segments (the review flow) the fan-out is synchronous and
// memory_ids is final at response time. Without segments (legacy async path,
// spec 21) memory_ids is EMPTY — the fragment stars arrive on the next
// GetUniverse refetch (constitution §6); it is then non-empty only on an
// idempotent replay of an already fanned-out record.
message RecordMemoryResponse {
  string record_id = 1;            // immutable original (final)
  repeated string memory_ids = 2;  // fragment stars — empty on the async path
}

// --- GetUniverse (idempotent) ---

// Star is the visual input for a star (no body). Brightness = max(a_min,
// activation) is computed client-side; the server is authoritative only over
// last_recalled_at.
// Field number 11 = 36 resonance (RESERVED); 5–8 are the spec 23 reshaping
// state (mutable star layer); 9–10 = 28 wayfinding; valence takes 12;
// relevance (26) takes 13. (00.overview 공유 설계 결정 — Star 필드 번호 할당)
message Star {
  string memory_id = 1;
  Mood mood = 2;
  double intensity = 3;
  string last_recalled_at = 4;
  double brightness_offset = 5;  // 23: 누적 ±밝기 오프셋(재공고화); client composites onto brightness
  double hue_shift = 6;          // 23: 감정 기준 색 ±28° 색조(degrees)
  double form_seed_delta = 7;    // 23: 형태 시드 미세 jitter
  int32 version = 8;             // 23: 재성형 횟수(=변천사 길이)
  // 28: 별이 어느 원본 일기(불변 record)의 몇 번째 조각인지. 클라가 GetUniverse 응답을
  // record_id로 그룹해 "일기 단위"로 조망/하이라이팅한다(별-그룹핑엔 신규 쿼리 불필요).
  string record_id = 9;        // 일기 단위 그룹/조망 키 (21이 채운 memories.record_id)
  int32 fragment_index = 10;   // 일기 내 조각 순서 (21이 채운 memories.fragment_index)
  // 36: 이 별이 공명(resonance)으로 다른 우주의 별과 이어져 있는지. GetUniverse가 resonances
  // 조인으로 채운다(보낸 별·수락으로 태어난 별 양쪽). 공개 우주(35 SharedStar)엔 이 필드가
  // 없다 — 제3자에게 관계 비노출(비목표). FE가 은은한 공명 마커를 그리는 트리거.
  bool resonant = 11;
  double valence = 12;         // -1..1 signed affect (spec 21; 26 consumes in λ_eff)
  // 26: 0..1 별 임베딩 ↔ "요즘 토픽 중심 벡터"의 cos 정합도. 서버가 GetUniverse에서
  // 계산(weight처럼 의미 그래프 파생값 — 헌법3 위반 아님; 밝기 자체는 여전히 클라가
  // exp(-λ_eff·Δt)로 계산). 임베딩 미생성 별·데모(서버 없음)에선 0=중립.
  double relevance = 13;
  // 07: 누적 회상 횟수(서버 권위 원자료, RecallMemoryTouch마다 +1). 클라가 Bjork 저장강도
  // S=(storage_base+recall_count)·(1+emo·intensity)와 인출강도 R=exp(-Δt/τ(S))를 파생해
  // 자기근접 반지름(38)+배경 감정 순위를 함께 구동한다. 기존 별은 1로 백필(relevance와 동급의 원자료).
  int64 recall_count = 14;
}

// Synapse is a weighted, undirected (a < b) link. Only weight is authoritative;
// thickness/brightness are derived in the client shader.
message Synapse {
  string a_id = 1;
  string b_id = 2;
  double weight = 3;
  string link_type = 4;
  string last_activated_at = 5;
  // 26: 공동 회상 횟수(이미 memory_links에 영속·ListLinksByUser가 SELECT 중). 링크
  // 활력(자주 함께 떠올린 연결일수록 또렷)을 시각에 반영하고, 27 야간 가지치기 입력으로 노출.
  int32 co_activation_count = 6;
}

message GetUniverseRequest {}

// 07: AmbientMood(서버 요즘-감정 종합)는 은퇴했다. 클라가 로드된 별(+recall_count)에서 Bjork
// 인출 강도 R의 mood별 Σ R로 감정 순위·arousal을 직접 파생하므로 서버 종합이 불필요하다.
// 필드 3은 reserved(재사용 금지) — 옛 클라가 보내도 무시된다.
message GetUniverseResponse {
  reserved 3;
  reserved "ambient";
  repeated Star stars = 1;
  repeated Synapse synapses = 2;
}

// --- RecallMemory (reconsolidation) ---

message RecallMemoryRequest {
  string memory_id = 1;
}

// Record is the immutable original (sourced from the records table). Reached two
// ways: by a star (RecallMemory, keyed by memory_id) and by the diary id directly
// (GetRecord, keyed by record_id — the standalone read-only diary page, spec 28).
// On the record-id read memory_id is empty (no star context); on the recall read
// record_id is empty (the star already knows its memory_id). Field numbers are
// append-only — record_id appended as 7 (memory_id keeps 1).
message Record {
  string memory_id = 1;
  string body = 2;
  string entry_date = 3;
  Mood mood = 4;
  double intensity = 5;
  string created_at = 6;
  string record_id = 7;        // 일기 단위 키 (GetRecord 응답에서 채움; RecallMemory 응답에선 "")
}

message RecallMemoryResponse {
  Record record = 1;
  // 28: 이 별(조각)의 텍스트 — 별 → 조각. records.body는 원본 일기 전체로 유지하고,
  // 여기엔 그 별이 가리키는 fragment(memories.fragment_text)만 싣는다. 단일 조각/구
  // 데이터(fragment_text NULL)면 빈 문자열(클라가 record.body로 폴백).
  string fragment_text = 2;
}

// --- GetRecord (idempotent original-diary read by record id, spec 28) ---

// GetRecord reads one immutable original diary by its record_id (the Star.record_id
// group key / RecordSummary.record_id), for the standalone read-only diary page
// (change 09). NO_SIDE_EFFECTS — unlike RecallMemory it never touches the star
// layer (no last_recalled_at / recall_count bump): reading a diary in the journal
// must not re-ignite its stars. Owner-guarded — another user's record → NotFound.
message GetRecordRequest {
  string record_id = 1;
}

message GetRecordResponse {
  Record record = 1;
}

// --- ListRecords (original-diary list for 원본 일기로 별 찾기, spec 28) ---

// RecordSummary is one immutable original diary as a wayfinding entry point: its id
// (the Star.record_id group key), the entry date, a short body EXCERPT (never the full
// body — that's RecallMemory's Record), and how many fragment stars (조각 별) it spawned.
message RecordSummary {
  string record_id = 1;
  string entry_date = 2;     // YYYY-MM-DD
  string body_excerpt = 3;   // 일부(excerpt)만 — 본문 전체 아님
  int32 star_count = 4;      // 그 일기에서 태어난 조각 별 개수
  // change 09: 이 일기에서 태어난 조각 별들의 감정 facet(중복 제거). 일기 목록의 감정 필터가
  // 서버 round-trip 없이 클라에서 걸 수 있게 함께 싣는다. 빈 배열 = 감정 미설정 조각만.
  repeated Mood moods = 5;
}

message ListRecordsRequest {}

message ListRecordsResponse {
  repeated RecordSummary records = 1;  // entry_date 내림차순
}

// --- GetEvolutionHistory (append-only 변천사 read; UI is spec 24) ---

// EvolutionSnapshot is one append-only reshaping event of a star: the cumulative
// reshaping state at that version plus what triggered it. Rows are never updated
// or deleted (constitution §1·§2); the timelapse UI (spec 24) reads them ascending.
message EvolutionSnapshot {
  int32 version = 1;
  double brightness = 2;          // brightness_offset snapshot at this version
  double hue_shift = 3;
  double form_seed_delta = 4;
  string trigger = 5;             // 'recall' | 'new_neighbor' | 'nightly_gist'(27)
  double pe = 6;                  // prediction error that opened the soft window
  int32 dir = 7;                  // +1 강화 / -1 약화
  string created_at = 8;
}

message GetEvolutionHistoryRequest {
  string memory_id = 1;
}

message GetEvolutionHistoryResponse {
  repeated EvolutionSnapshot snapshots = 1;  // version ascending
}

// --- ReinforceLinks (batch upsert) ---

// Reinforcement is accumulated locally on the client, then flushed as a unary
// batch. delta_weight is an increment, not an absolute value.
message LinkDelta {
  string a_id = 1;
  string b_id = 2;
  double delta_weight = 3;
}

message ReinforceLinksRequest {
  repeated LinkDelta items = 1;
  string batch_id = 2;
}

message ReinforceLinksResponse {}

// --- ListDormant (dormant stars) ---

message ListDormantRequest {}

message ListDormantResponse {
  repeated Star stars = 1;     // reuses Star (no separate DormantStar message)
}

// MemoryService is the single service (no separate LinkService). All RPCs are
// unary — streaming is intentionally not defined (constitution §6).
// NO_SIDE_EFFECTS on the idempotent reads exposes them as HTTP GET (connect-go
// accepts GET automatically; the web transport opts in via useHttpGet — §4.4).
service MemoryService {
  rpc SegmentMemory(SegmentMemoryRequest) returns (SegmentMemoryResponse);      // preview, no write
  rpc RecordMemory(RecordMemoryRequest) returns (RecordMemoryResponse);
  rpc GetUniverse(GetUniverseRequest) returns (GetUniverseResponse) {            // idempotent
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  rpc ReinforceLinks(ReinforceLinksRequest) returns (ReinforceLinksResponse);    // batch upsert
  rpc RecallMemory(RecallMemoryRequest) returns (RecallMemoryResponse);          // reconsolidation
  rpc GetRecord(GetRecordRequest) returns (GetRecordResponse) {                  // 원본 일기 읽기(28) — 부작용 없음
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  rpc ListDormant(ListDormantRequest) returns (ListDormantResponse) {            // dormant stars
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  rpc GetEvolutionHistory(GetEvolutionHistoryRequest) returns (GetEvolutionHistoryResponse) {  // 변천사(24)
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  rpc ListRecords(ListRecordsRequest) returns (ListRecordsResponse) {                          // 원본 일기 목록(28)
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}

// --- Settings (per-user visual personalization, spec 30) ---
//
// The server stores only the user's OVERRIDES; the client owns the default
// palette/theme/object (it must, for the unauth/offline path) and merges these
// over them. Empty theme/star_object and absent emotion_colors entries mean
// "use the client default" — the server does not duplicate the defaults.

// EmotionColor overrides one mood's star color. color is "#RRGGBB".
message EmotionColor {
  Mood mood = 1;
  string color = 2;
}

// Settings is the user's stored visual overrides (not a complete config — the
// client merges these over its defaults). The four selection axes (spec 44):
// theme = background, star_object = star, self_object = self, synapse_style =
// synapse. Field numbers are append-only (4·5 added; theme keeps its wire name
// even though the domain term is now "background" — a stable identifier).
message Settings {
  string theme = 1;                          // "" = client default (background vast)
  string star_object = 2;                    // "" = client default (star deepfield)
  repeated EmotionColor emotion_colors = 3;  // only moods the user overrode (0..13)
  string self_object = 4;                    // "" = client default (self mirrorball)
  string synapse_style = 5;                  // "" = client default (synapse filament)
}

message GetSettingsRequest {}

message GetSettingsResponse {
  Settings settings = 1;
}

// Partial update: only present fields are upserted; omitted fields are preserved.
// Sending emotion_colors upserts that subset — it never deletes the others. A
// present axis selecting a NOT-OWNED (and not-free) paid item → FailedPrecondition
// (ErrNotOwned) — a locked item can't be selected via the API (spec 44).
message UpdateSettingsRequest {
  optional string theme = 1;
  optional string star_object = 2;
  repeated EmotionColor emotion_colors = 3;
  optional string self_object = 4;
  optional string synapse_style = 5;
}

message UpdateSettingsResponse {
  Settings settings = 1;                     // the stored overrides after the update
}

// --- Inventory / purchase (별가루 wallet + ownership, spec 44) ---

// Stardust balance + the set of OWNED paid item ids. Free kinds are NOT listed
// (implicit ownership — the client knows them from its catalog). item ids are the
// stable "<axis>:<kind>" identifiers (e.g. "star:aurora").
message GetInventoryRequest {}

message GetInventoryResponse {
  int64 stardust = 1;
  repeated string owned_item_ids = 2;        // paid items the user has bought (free kinds excluded)
}

message PurchaseItemRequest {
  string item_id = 1;                        // a known PAID item id ("<axis>:<kind>")
}

// The new inventory state after a successful purchase (balance debited, item granted).
message PurchaseItemResponse {
  int64 stardust = 1;
  repeated string owned_item_ids = 2;
}

// SettingsService owns per-user visual personalization + the customization economy
// (wallet/ownership/purchase, spec 44) — a separate bounded context from
// MemoryService (the star graph). unary only (constitution §6); GetSettings and
// GetInventory are idempotent (exposed as HTTP GET). PurchaseItem mutates (no
// NO_SIDE_EFFECTS). All RPCs require auth.
service SettingsService {
  rpc GetSettings(GetSettingsRequest) returns (GetSettingsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  rpc UpdateSettings(UpdateSettingsRequest) returns (UpdateSettingsResponse);
  rpc GetInventory(GetInventoryRequest) returns (GetInventoryResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  rpc PurchaseItem(PurchaseItemRequest) returns (PurchaseItemResponse);
}
