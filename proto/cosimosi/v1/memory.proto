syntax = "proto3";

package cosimosi.v1;

// Import path matches the source-relative output dir (proto path cosimosi/v1/);
// the part after ';' sets the Go package name (cosimosiv1) + connect subpackage
// (cosimosiv1connect). See backend/buf.gen.yaml (paths=source_relative).
option go_package = "github.com/cosimosi/backend/internal/gen/cosimosi/v1;cosimosiv1";

// memory.proto is the single transport contract shared by web + React Native.
//
// It is a DTO layer, NOT the domain (constitution §5): no coordinate fields —
// star positions emerge client-side in the force-sim (constitution §3); the
// server is authoritative only over the weighted graph. unary only — no
// streaming (constitution §6, RN cannot consume server streams).

// Mood is the single source of truth for the 13 moods (4 affective quadrants ×3 +
// neutral; spec 29), shared by BE/FE generated types. records.mood (TEXT, nullable)
// stores this enum's name string. Existing 1–7 are frozen; new 6 appended (wire-compat).
enum Mood {
  MOOD_UNSPECIFIED = 0;
  JOY = 1;
  CALM = 2;
  SAD = 3;
  ANGER = 4;
  FEAR = 5;
  LOVE = 6;
  NEUTRAL = 7;
  EXCITEMENT = 8;
  GRATITUDE = 9;
  RELIEF = 10;
  STRESS = 11;
  TIRED = 12;
  EMPTINESS = 13;
}

// --- RecordMemory ---

// mood/intensity/valence are OPTIONAL whole-diary hints (spec 21): the AI
// extractor detects per-fragment emotion, so unset values are simply ignored;
// a set hint is only used as the fallback when extraction degrades.
message RecordMemoryRequest {
  string body = 1;
  Mood mood = 2;               // optional hint (manual-emotion toggle)
  double intensity = 3;        // optional hint, 0..1
  string entry_date = 4;       // YYYY-MM-DD
  string idempotency_key = 5;
  double valence = 6;          // optional hint, -1..1 (0 = unset/neutral)
}

// Fragment fan-out is asynchronous (spec 21): only the immutable record id is
// final at response time. memory_ids is usually EMPTY — the fragment stars
// arrive on the next GetUniverse refetch (constitution §6, "stars arrive
// async"); it is non-empty only on an idempotent replay of an already
// fanned-out record.
message RecordMemoryResponse {
  string record_id = 1;            // immutable original (final)
  repeated string memory_ids = 2;  // fragment stars — may be empty
}

// --- GetUniverse (idempotent) ---

// Star is the visual input for a star (no body). Brightness = max(a_min,
// activation) is computed client-side; the server is authoritative only over
// last_recalled_at.
// Field numbers 5–11 are RESERVED by later specs (5–8 = 23 reshaping,
// 9–10 = 28 wayfinding, 11 = 36 resonance — 00.overview 공유 설계 결정);
// valence therefore takes 12.
message Star {
  string memory_id = 1;
  Mood mood = 2;
  double intensity = 3;
  string last_recalled_at = 4;
  double valence = 12;         // -1..1 signed affect (spec 21; 26 consumes in λ_eff)
}

// Synapse is a weighted, undirected (a < b) link. Only weight is authoritative;
// thickness/brightness are derived in the client shader.
message Synapse {
  string a_id = 1;
  string b_id = 2;
  double weight = 3;
  string link_type = 4;
  string last_activated_at = 5;
}

message GetUniverseRequest {}

message GetUniverseResponse {
  repeated Star stars = 1;
  repeated Synapse synapses = 2;
}

// --- RecallMemory (reconsolidation) ---

message RecallMemoryRequest {
  string memory_id = 1;
}

// Record is the immutable original (sourced from the records table).
message Record {
  string memory_id = 1;
  string body = 2;
  string entry_date = 3;
  Mood mood = 4;
  double intensity = 5;
  string created_at = 6;
}

message RecallMemoryResponse {
  Record record = 1;
}

// --- ReinforceLinks (batch upsert) ---

// Reinforcement is accumulated locally on the client, then flushed as a unary
// batch. delta_weight is an increment, not an absolute value.
message LinkDelta {
  string a_id = 1;
  string b_id = 2;
  double delta_weight = 3;
}

message ReinforceLinksRequest {
  repeated LinkDelta items = 1;
  string batch_id = 2;
}

message ReinforceLinksResponse {}

// --- ListDormant (dormant stars) ---

message ListDormantRequest {}

message ListDormantResponse {
  repeated Star stars = 1;     // reuses Star (no separate DormantStar message)
}

// MemoryService is the single service (no separate LinkService). All RPCs are
// unary — streaming is intentionally not defined (constitution §6).
// NO_SIDE_EFFECTS on the idempotent reads exposes them as HTTP GET (connect-go
// accepts GET automatically; the web transport opts in via useHttpGet — §4.4).
service MemoryService {
  rpc RecordMemory(RecordMemoryRequest) returns (RecordMemoryResponse);
  rpc GetUniverse(GetUniverseRequest) returns (GetUniverseResponse) {            // idempotent
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  rpc ReinforceLinks(ReinforceLinksRequest) returns (ReinforceLinksResponse);    // batch upsert
  rpc RecallMemory(RecallMemoryRequest) returns (RecallMemoryResponse);          // reconsolidation
  rpc ListDormant(ListDormantRequest) returns (ListDormantResponse) {            // dormant stars
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}

// --- Settings (per-user visual personalization, spec 30) ---
//
// The server stores only the user's OVERRIDES; the client owns the default
// palette/theme/object (it must, for the unauth/offline path) and merges these
// over them. Empty theme/star_object and absent emotion_colors entries mean
// "use the client default" — the server does not duplicate the defaults.

// EmotionColor overrides one mood's star color. color is "#RRGGBB".
message EmotionColor {
  Mood mood = 1;
  string color = 2;
}

// Settings is the user's stored visual overrides (not a complete config — the
// client merges these over its defaults).
message Settings {
  string theme = 1;                          // "" = client default (vast)
  string star_object = 2;                    // "" = client default (deepfield)
  repeated EmotionColor emotion_colors = 3;  // only moods the user overrode (0..13)
}

message GetSettingsRequest {}

message GetSettingsResponse {
  Settings settings = 1;
}

// Partial update: only present fields are upserted; omitted fields are preserved.
// Sending emotion_colors upserts that subset — it never deletes the others.
message UpdateSettingsRequest {
  optional string theme = 1;
  optional string star_object = 2;
  repeated EmotionColor emotion_colors = 3;
}

message UpdateSettingsResponse {
  Settings settings = 1;                     // the stored overrides after the update
}

// SettingsService owns per-user visual personalization — a separate bounded
// context from MemoryService (the star graph). unary only (constitution §6);
// GetSettings is idempotent (exposed as HTTP GET).
service SettingsService {
  rpc GetSettings(GetSettingsRequest) returns (GetSettingsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  rpc UpdateSettings(UpdateSettingsRequest) returns (UpdateSettingsResponse);
}
