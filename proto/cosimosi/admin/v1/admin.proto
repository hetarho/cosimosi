syntax = "proto3";

package cosimosi.admin.v1;

// AdminService is the operator console contract (the admin console): a web-only /admin surface's backend.
// Every method is admin-gated by the admin-authorization interceptor (env-seed ADMIN_USER_IDS ∪
// DB-promoted admin_users) layered on the the auth session auth interceptor — a non-admin caller is
// rejected with PermissionDenied before any handler runs.
//
// Privacy defense ([I2]): this contract is metadata-only. No message here carries diary text,
// emotion, episodic memory meaning, position, or any memory content — the console can enumerate accounts and
// their balances/counts, never read what a user wrote. AI provider keys are write-only: they enter
// only through SetAIConfigRequest.api_key and are never returned (GetAIConfig reports key_set + a
// masked hint).
service AdminService {
  // Whether the caller is an admin — the FE gate/affordance source. Side-effect-free.
  rpc GetAdminSelf(GetAdminSelfRequest) returns (GetAdminSelfResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // The current admin set (env-seed + DB-promoted). Side-effect-free.
  rpc ListAdmins(ListAdminsRequest) returns (ListAdminsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  // Promote a user to admin (adds an admin_users row). Idempotent.
  rpc GrantAdmin(GrantAdminRequest) returns (GrantAdminResponse);
  // Demote a promoted admin (removes the admin_users row). Refused for a seed admin — the
  // ADMIN_USER_IDS set is the undemotable trust anchor.
  rpc RevokeAdmin(RevokeAdminRequest) returns (RevokeAdminResponse);

  // Paginated, searchable account list — metadata only ([I2]). Side-effect-free.
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  // Grant additional (permanent) stardust to a user (별가루 증정) — an append-only admin_grant
  // earn, capped by twinkle.admin_grant_max, idempotent per grant_id.
  rpc GrantStardust(GrantStardustRequest) returns (GrantStardustResponse);
  // The admin stardust grant history for accountability. Side-effect-free.
  rpc ListTwinkleGrants(ListTwinkleGrantsRequest) returns (ListTwinkleGrantsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // Every provider slot with its per-provider API-key status + capability support. The key itself
  // is never returned — only key_set + a masked hint. Side-effect-free.
  rpc ListProviderKeys(ListProviderKeysRequest) returns (ListProviderKeysResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  // Store (encrypt at rest) one provider's API key. Rejects an unknown provider slot.
  rpc SetProviderKey(SetProviderKeyRequest) returns (SetProviderKeyResponse);
  // Remove one provider's stored key.
  rpc ClearProviderKey(ClearProviderKeyRequest) returns (ClearProviderKeyResponse);

  // The capability→provider/model selection (DB override over env). Side-effect-free.
  rpc GetAIConfig(GetAIConfigRequest) returns (GetAIConfigResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  // Select one capability's provider + model among the keyed, capability-compatible, implemented
  // providers (DB override, applied without redeploy). No key here — keys are set per provider.
  rpc SetAIConfig(SetAIConfigRequest) returns (SetAIConfigResponse);

  // Today's AI call usage against the metering caps (read-only; process-local snapshot).
  rpc GetAIUsage(GetAIUsageRequest) returns (GetAIUsageResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  // Aggregate background-job queue health (read-only).
  rpc GetJobHealth(GetJobHealthRequest) returns (GetJobHealthResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}

// The AI capability a provider config / usage row applies to. LLM and embedding are selected
// independently (the AI-provider abstraction).
enum AICapability {
  AI_CAPABILITY_UNSPECIFIED = 0;
  AI_CAPABILITY_LLM = 1;
  AI_CAPABILITY_EMBEDDING = 2;
}

message GetAdminSelfRequest {}
message GetAdminSelfResponse {
  bool is_admin = 1;
}

// One admin in the current set. Seed admins (from ADMIN_USER_IDS) have is_seed=true and no
// granted_by/granted_at; promoted admins carry both.
message AdminEntry {
  string user_id = 1;
  bool is_seed = 2;
  string granted_by = 3;
  string granted_at = 4;  // RFC3339; empty for seed admins
}
message ListAdminsRequest {}
message ListAdminsResponse {
  repeated AdminEntry admins = 1;
}

message GrantAdminRequest {
  string user_id = 1;
}
message GrantAdminResponse {
  bool is_admin = 1;  // true after promotion
}
message RevokeAdminRequest {
  string user_id = 1;
}
message RevokeAdminResponse {
  bool is_admin = 1;  // false after demotion
}

// Account metadata for the admin user list — NO memory content ([I2]). Balances/counts are
// aggregates; the diary/episodic memory fields are counts, never the underlying entries.
message AdminUser {
  string user_id = 1;
  string email = 2;
  string signup_at = 3;  // RFC3339
  bool is_admin = 4;
  bool is_seed_admin = 5;
  int64 basic = 6;
  int64 additional = 7;
  int64 total = 8;
  int64 diary_count = 9;
  int64 episodic_memory_count = 10;
}
message ListUsersRequest {
  int32 page = 1;       // 0-based
  int32 page_size = 2;  // 0 → admin.user_list_page_size default
  string query = 3;     // email/id prefix match; empty = all
}
message ListUsersResponse {
  repeated AdminUser users = 1;
  int32 page = 2;
  bool has_more = 3;
}

message GrantStardustRequest {
  string user_id = 1;
  int64 amount = 2;    // 0 < amount ≤ twinkle.admin_grant_max
  string note = 3;
  string grant_id = 4;  // client idempotency key; a replay returns the same balance
}
message GrantStardustResponse {
  int64 balance_total = 1;  // the target's balance total after the grant
}

message TwinkleGrant {
  string id = 1;
  string granted_by = 2;
  string target_user = 3;
  int64 amount = 4;
  string note = 5;
  string created_at = 6;  // RFC3339
}
message ListTwinkleGrantsRequest {
  int32 page = 1;
  int32 page_size = 2;
}
message ListTwinkleGrantsResponse {
  repeated TwinkleGrant grants = 1;
  int32 page = 2;
  bool has_more = 3;
}

// One provider slot's key status + capability support. key_hint is a masked tail (e.g. "…abcd") or
// empty; the key itself is never returned. supports_* = the slot offers that capability;
// implemented_* = a concrete adapter exists (an unimplemented slot can hold a key but fails if
// selected until its adapter ships).
message ProviderKey {
  string provider = 1;
  bool key_set = 2;
  string key_hint = 3;
  bool supports_llm = 4;
  bool supports_embedding = 5;
  bool implemented_llm = 6;
  bool implemented_embedding = 7;
  string updated_by = 8;
  string updated_at = 9;  // RFC3339; empty when unset
}
message ListProviderKeysRequest {}
message ListProviderKeysResponse {
  repeated ProviderKey providers = 1;
}
message SetProviderKeyRequest {
  string provider = 1;
  string api_key = 2;  // encrypted at rest; write-only
}
message SetProviderKeyResponse {
  ProviderKey provider = 1;
}
message ClearProviderKeyRequest {
  string provider = 1;
}
message ClearProviderKeyResponse {
  ProviderKey provider = 1;
}

// One capability's selected provider + model. source tells the operator where it comes from
// ("db" | "env" | "unset").
message CapabilitySelection {
  AICapability capability = 1;
  string provider = 2;
  string model = 3;
  string source = 4;
  string updated_by = 5;
  string updated_at = 6;  // RFC3339; empty when unset/from env
}
message GetAIConfigRequest {}
message GetAIConfigResponse {
  repeated CapabilitySelection selections = 1;
}
message SetAIConfigRequest {
  AICapability capability = 1;
  string provider = 2;
  string model = 3;
}
message SetAIConfigResponse {
  CapabilitySelection selection = 1;
}

message AIUsageCapability {
  AICapability capability = 1;
  int64 calls_today = 2;
  int64 daily_cap = 3;
}
message GetAIUsageRequest {}
message GetAIUsageResponse {
  repeated AIUsageCapability capabilities = 1;
  int64 per_call_token_cap = 2;
  string window_utc_day = 3;  // the UTC calendar day the counts cover
  bool process_local = 4;     // true: the meter is in-process/in-memory (the admin console limitation)
}

message GetJobHealthRequest {}
message GetJobHealthResponse {
  int64 pending = 1;
  int64 running = 2;
  int64 done = 3;
  int64 failed = 4;
  int64 dead_lettered = 5;
}
