# buf v2 codegen template. Invoked from the repo root as
#   buf generate --template proto/buf.gen.yaml proto
# so every `out:` is repo-root-relative (buf resolves out against the cwd, not
# this file). Plugins are remote (run on the BSR) — nothing to install locally,
# which matters because Windows Application Control blocks unsigned .exe here.
#
version: v2
clean: true
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/cosimosi/api/internal/gen
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: apps/api/internal/gen
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go:v1.20.0
    out: apps/api/internal/gen
    opt: paths=source_relative
  - remote: buf.build/bufbuild/es:v2.12.1
    out: packages/api-client/src/gen
    opt: target=ts
