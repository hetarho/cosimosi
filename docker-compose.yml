name: cosimosi

# Phase 1 dev stack: the Go API plus the local persistence service. Product
# runtime services return only when their own units need them.
services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: cosimosi-api
    environment:
      PORT: '8080'
      # describe_exec mirrors prod: Supabase's transaction pooler can't keep server-side
      # NAMED prepared statements (pgx's default cache_statement → 42P05), so we use the
      # unnamed describe→execute mode. It stays pooler-safe AND type-aware — pgx describes
      # each statement to learn param OIDs, so JSONB []byte params encode correctly (unlike
      # simple_protocol/exec, which drop the type info and send jsonb as bytea → 22P02).
      # Running dev the same way surfaces pooler-only failures locally before they ship.
      DATABASE_URL: postgres://cosimosi:cosimosi@postgres:5432/cosimosi?sslmode=disable&default_query_exec_mode=describe_exec
      COSIMOSI_DEV_WORKER: '1'
      # Dev sign-in bypass, toggled from the root .env (empty = off → real auth). The verifier
      # trusts only fake-token-<COSIMOSI_DEV_USER_ID>. See scripts/seed-dev-universe.sql and .env.example.
      COSIMOSI_DEV_AUTH: '${COSIMOSI_DEV_AUTH:-}'
      COSIMOSI_DEV_USER_ID: '${COSIMOSI_DEV_USER_ID:-}'
      # Optional local-only diagnostics. Exact "verbose" exposes raw internal causes only in the
      # ErrorInfo debug_detail field; empty/unknown values stay masked.
      COSIMOSI_ERROR_DETAIL: '${COSIMOSI_ERROR_DETAIL:-}'
      # Admin console (plan 58): seed admins, the at-rest key-encryption master key (REQUIRED to
      # store provider API keys), and the Supabase service-role key that powers the user list. All
      # from the root .env; empty = off. See .env.example.
      ADMIN_USER_IDS: '${ADMIN_USER_IDS:-}'
      LLM_KEY_ENCRYPTION_KEY: '${LLM_KEY_ENCRYPTION_KEY:-}'
      SUPABASE_SERVICE_ROLE_KEY: '${SUPABASE_SERVICE_ROLE_KEY:-}'
      SUPABASE_URL: '${SUPABASE_URL:-}'
    ports:
      - '8080:8080'
    volumes:
      - ./apps/api:/app
      - api_go_mod:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:0.8.3-pg17
    container_name: cosimosi-postgres
    environment:
      POSTGRES_USER: cosimosi
      POSTGRES_PASSWORD: cosimosi
      POSTGRES_DB: cosimosi
    ports:
      - '5432:5432'
    volumes:
      - api_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cosimosi -d cosimosi']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  api_go_mod:
  api_postgres_data:
