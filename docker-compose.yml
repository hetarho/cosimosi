name: cosimosi

# Foundation dev stack: just the Go api hello world. Postgres, AI adapters, and the
# rest of the runtime config return with their own units (data-persistence onward).
services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: cosimosi-api
    environment:
      PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./apps/api:/app
      - api_go_mod:/go/pkg/mod

volumes:
  api_go_mod:
