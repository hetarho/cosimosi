# Hot-reload for the dev container: air rebuilds and restarts ./cmd/api on save.
# Polling is on because bind-mounted source on Docker Desktop (macOS) does not
# reliably deliver fsnotify events.
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api ./cmd/api"
  bin = "./tmp/api"
  full_bin = "./tmp/api"
  include_ext = ["go"]
  exclude_dir = ["tmp", "bin"]
  exclude_regex = ["_test\\.go$"]
  stop_on_error = true
  delay = 500
  poll = true
  poll_interval = 500

[misc]
  clean_on_exit = true
