# Backend deploy. The `build` job BUILDS the static image (validates the Dockerfile) and
# PUSHES it to GHCR only when deploy is enabled; the `rollout` job (migrate → swap the API
# over SSH) runs once the VPS is ready (repo variable DEPLOY_ENABLED=true + SSH/DB secrets).
# develop→staging, main→production (one VPS, two stacks).
#
# Manual-only during the platform rebuild: real deployment is out of scope for the
# foundation, so this never fires on push. The deployment unit re-arms the push trigger
# (apps/api paths) when hosting returns.
name: Deploy backend

on:
  workflow_dispatch:

# Serialize deploys per environment (never roll two images at once).
concurrency:
  group: deploy-backend-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/hetarho/cosimosi-api
      ENV_NAME: ${{ github.ref_name == 'main' && 'prod' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate production Compose
        env:
          IMAGE_TAG: validation
          API_UPSTREAM: cosimosi-api-validation
        run: |
          test ! -e .env
          cp .env.example .env
          trap 'rm -f .env' EXIT
          docker compose -f docker-compose.prod.yml config --quiet --no-env-resolution

      # Login only needed when we actually push (DEPLOY_ENABLED). GITHUB_TOKEN is automatic.
      - name: Log in to GHCR
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (push to GHCR only when deploy is enabled)
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ env.ENV_NAME }}

  rollout:
    needs: build
    runs-on: ubuntu-latest
    # VPS가 준비되기 전에는 건너뛴다(빨간 실패 방지). 준비되면 repo variable
    # DEPLOY_ENABLED=true + 아래 secrets(SSH_HOST/SSH_USER/SSH_KEY, env별 DIRECT_DATABASE_URL)
    # 를 설정하면 자동으로 동작한다.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    # GitHub Environment → per-env secrets + optional manual-approval protection on prod.
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    env:
      ENV_NAME: ${{ github.ref_name == 'main' && 'prod' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      # The runtime definition and migration files must be on the VPS before rollout.
      - name: Sync production Compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: 'docker-compose.prod.yml'
          target: '/srv/cosimosi-${{ env.ENV_NAME }}'

      - name: Sync migrations to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: 'apps/api/db/migrations/*'
          target: '/srv/cosimosi-${{ env.ENV_NAME }}/migrations'
          strip_components: 4

      - name: Pull → quiesce → migrate (direct 5432) → roll out
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ github.sha }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: IMAGE_TAG,DIRECT_DATABASE_URL,ENV_NAME
          script: |
            set -eu
            cd "/srv/cosimosi-${ENV_NAME}"

            compose() {
              docker compose -f docker-compose.prod.yml "$@"
            }
            set_image_tag() {
              if grep -q '^IMAGE_TAG=' .env; then
                sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$1|" .env
              else
                echo "IMAGE_TAG=$1" >> .env
              fi
            }

            # Preserve the complete untracked environment file so a failed migration can
            # restore the previous image selection without disturbing any runtime secrets.
            ENV_BACKUP=.env.deploy-backup
            cp -p .env "$ENV_BACKUP"
            trap 'rm -f "$ENV_BACKUP"' EXIT

            API_WAS_RUNNING=false
            WORKER_WAS_RUNNING=false
            if [ -n "$(compose ps -q --status running api)" ]; then
              API_WAS_RUNNING=true
            fi
            if [ -n "$(compose ps -q --status running worker)" ]; then
              WORKER_WAS_RUNNING=true
            fi

            restart_previous_services() {
              restart_failed=false
              if [ "$API_WAS_RUNNING" = true ] && ! compose up -d --no-deps api; then
                restart_failed=true
              fi
              if [ "$WORKER_WAS_RUNNING" = true ] && ! compose up -d --no-deps worker; then
                restart_failed=true
              fi
              [ "$restart_failed" = false ]
            }

            # 1) Resolve and pull both processes from the same immutable SHA before taking
            #    either currently-running process offline.
            set_image_tag "$IMAGE_TAG"
            if ! compose pull api worker; then
              cp -p "$ENV_BACKUP" .env
              exit 1
            fi

            # 2) Migration 00011 rewrites the live queue contract. Stop every producer and
            #    consumer before goose can acquire its table locks.
            if ! compose stop -t 30 api worker; then
              cp -p "$ENV_BACKUP" .env
              restart_previous_services || true
              exit 1
            fi

            # 3) Migrate through the DIRECT connection (5432 — never the 6543 pooler for
            #    DDL). On failure, restore the old tag and exactly the services that were
            #    running before this rollout.
            #    goose has no official Docker image — kukymbr/goose-docker wrapper, same
            #    as scripts/db.mjs: mounts /migrations, command via GOOSE_COMMAND.
            if ! docker run --rm -v "$PWD/migrations:/migrations" \
                -e GOOSE_DRIVER=postgres -e GOOSE_DBSTRING="$DIRECT_DATABASE_URL" \
                -e GOOSE_COMMAND=up \
                ghcr.io/kukymbr/goose-docker:3.27.1; then
              cp -p "$ENV_BACKUP" .env
              restart_previous_services || true
              exit 1
            fi

            # 4) The successful migration commits the already-recorded IMAGE_TAG. Start
            #    the API and worker from that same image, then prune dangling layers.
            #    --remove-orphans: drop containers for services removed from the compose
            #    file (e.g. the old per-stack caddy) instead of leaving them running.
            compose up -d --remove-orphans api worker
            docker image prune -f
