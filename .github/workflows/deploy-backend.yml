# Backend deploy. The `build` job BUILDS the static image (validates the Dockerfile) and
# PUSHES it to GHCR only when deploy is enabled; the `rollout` job (migrate → swap the API
# over SSH) runs once the VPS is ready (repo variable DEPLOY_ENABLED=true + SSH/DB secrets).
# develop→staging, main→production (one VPS, two stacks).
#
# Manual-only during the platform rebuild: real deployment is out of scope for the
# foundation, so this never fires on push. The deployment unit re-arms the push trigger
# (apps/api paths) when hosting returns.
name: Deploy backend

on:
  workflow_dispatch:

# Serialize deploys per environment (never roll two images at once).
concurrency:
  group: deploy-backend-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/hetarho/cosimosi-api
      ENV_NAME: ${{ github.ref_name == 'main' && 'prod' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      # Login only needed when we actually push (DEPLOY_ENABLED). GITHUB_TOKEN is automatic.
      - name: Log in to GHCR
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (push to GHCR only when deploy is enabled)
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ env.ENV_NAME }}

  rollout:
    needs: build
    runs-on: ubuntu-latest
    # VPS가 준비되기 전에는 건너뛴다(빨간 실패 방지). 준비되면 repo variable
    # DEPLOY_ENABLED=true + 아래 secrets(SSH_HOST/SSH_USER/SSH_KEY, env별 DIRECT_DATABASE_URL)
    # 를 설정하면 자동으로 동작한다.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    # GitHub Environment → per-env secrets + optional manual-approval protection on prod.
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    env:
      ENV_NAME: ${{ github.ref_name == 'main' && 'prod' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      # (6a) Migration files must be on the VPS before goose runs (it mounts them).
      - name: Sync migrations to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: 'apps/api/internal/db/migrations/*'
          target: '/srv/cosimosi-${{ env.ENV_NAME }}/migrations'
          strip_components: 5

      - name: Migrate (direct 5432) → set IMAGE_TAG → roll out
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ github.sha }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: IMAGE_TAG,DIRECT_DATABASE_URL,ENV_NAME
          script: |
            set -e
            cd "/srv/cosimosi-${ENV_NAME}"
            # 1) Migrations FIRST, via the DIRECT connection (5432 — never the 6543 pooler
            #    for DDL). Failure here exits non-zero → the API is never replaced.
            #    goose has no official Docker image — kukymbr/goose-docker wrapper, same
            #    as scripts/db.mjs: mounts /migrations, command via GOOSE_COMMAND.
            docker run --rm -v "$PWD/migrations:/migrations" \
              -e GOOSE_DRIVER=postgres -e GOOSE_DBSTRING="$DIRECT_DATABASE_URL" \
              -e GOOSE_COMMAND=up \
              ghcr.io/kukymbr/goose-docker:3.27.1
            # 2) Record IMAGE_TAG in the stack .env so `pull` and `up` resolve the SAME
            #    SHA (an inline IMAGE_TAG=... would only reach `pull`, spec 14 §4).
            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env
            else
              echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            fi
            # 3) Roll the API to the new image, then prune dangling layers.
            #    --remove-orphans: drop containers for services removed from the compose
            #    file (e.g. the old per-stack caddy) instead of leaving them running.
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
