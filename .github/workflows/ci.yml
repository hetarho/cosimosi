# PR merge gate (spec 14, 2.1): frontend lint + build and backend vet + build must pass
# before a PR can merge to develop/main. Linux runners, so the Windows .exe block (§8)
# doesn't apply — Go runs natively here.
name: CI

on:
  pull_request:
    branches: [develop, main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads packageManager (pnpm@10.x) from package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ./frontend lint
      - run: pnpm --filter ./frontend build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: go vet ./...
      - run: go build ./...
