# CI gate: web lint + build, blog build, and api vet + build must pass. Runs on PRs
# (merge gate) and on direct pushes to develop/main (solo-dev validation — no PR needed
# to catch a break). Linux runners run Go natively. No secrets, so it's safe to run anytime.
name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads packageManager (pnpm@10.x) from package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cosimosi/web lint
      - run: pnpm --filter @cosimosi/web build

  blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cosimosi/blog build

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          # The foundation api has no third-party deps yet (no go.sum); key the module
          # cache off go.mod. Switch to go.sum once a dependency is introduced.
          cache-dependency-path: apps/api/go.mod
      - run: go vet ./...
      - run: go build ./...
