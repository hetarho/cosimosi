root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api ./cmd/api"
  bin = "./tmp/api"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "bin", "internal/db/migrations", "internal/db/gen"]
  delay = 800
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
